<script>if(sessionStorage.getItem('portalOK')!=='1')location.replace('index.html');</script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}body{overflow-x:clip;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:880px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 24px;}
  .intro{font-size:13px;color:var(--muted);margin:6px 2px 14px;}

  .area{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin:14px 0;overflow:hidden;}
  .area-head{display:flex;align-items:center;gap:11px;padding:13px 15px;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;}
  .area-ic{font-size:22px;}
  .area-head h2{font-size:17px;margin:0;font-weight:800;flex:1;}
  .area-prog{background:rgba(255,255,255,.22);padding:3px 10px;border-radius:999px;font-size:13px;font-weight:800;}
  .area-all{margin:12px 15px 4px;background:#fff;border:1.5px dashed var(--line);color:var(--accent-dark);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
  .tasks{padding:6px 8px 12px;}
  .task{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:11px;cursor:pointer;}
  .task:active{background:#faf8f5;}
  .task input{position:absolute;opacity:0;width:0;height:0;}
  .task .box{flex:none;width:26px;height:26px;border:2px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .12s;background:#fff;}
  .task .box::after{content:"\2713";color:#fff;font-size:17px;font-weight:900;opacity:0;}
  .task input:checked + .box{background:var(--pos);border-color:var(--pos);}
  .task input:checked + .box::after{opacity:1;}
  .task .tt{font-size:15px;line-height:1.25;}
  .task input:checked ~ .tt{color:var(--muted);text-decoration:line-through;}

  .field{margin:18px 2px 0;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
  .field textarea{min-height:74px;resize:vertical;}

  .summary{margin:18px 2px 0;padding:13px 15px;background:var(--accent-soft);color:var(--accent-ink);border-radius:12px;font-size:14px;font-weight:700;text-align:center;}

  .submit{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 16px rgba(230,98,0,.3);}
  .submit:disabled{opacity:.6;cursor:default;}
  .submit:active:not(:disabled){transform:scale(.99);}

  /* sucesso */
  #ok{display:none;text-align:center;padding:40px 20px;}
  #ok .big{font-size:64px;line-height:1;}
  #ok h2{font-size:22px;margin:16px 0 6px;}
  #ok p{color:var(--muted);font-size:15px;margin:0 0 22px;}
  #ok .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  #ok a,#ok button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:800;cursor:pointer;text-decoration:none;font-family:inherit;}
  #ok a.sec{background:#fff;color:var(--accent-dark);border:1.5px solid var(--line);}
</style>
</head>

<main>
  <div id="form">
    <p class="intro">Marca as tarefas feitas em cada &#xE1;rea. No fim, escreve o teu nome e confirma &#x2014; o manager &#xE9; avisado automaticamente.</p>
    <div id="areas"></div>

    <div class="field">
      <label for="nome">O teu nome *</label>
      <select id="nome" data-staff data-ph="Seleciona o teu nome"></select>
    </div>
    <div class="field">
      <label for="obs">Observa&#xE7;&#xF5;es (opcional)</label>
      <textarea id="obs" placeholder="Algo a registar? (ex.: faltou material, avaria...)"></textarea>
    </div>

    <div class="summary" id="summary">0 tarefas marcadas</div>
    <button class="submit" id="btnSubmit"><i data-lu="check"></i> Confirmar checklist</button>
  </div>

  <div id="ok">
    <div class="big"><i data-lu="check"></i></div>
    <h2>Checklist registado!</h2>
    <p id="okMsg"></p>
    <div class="btns">
      <button onclick="location.reload()">Nova checklist</button>
      <a class="sec" href="index.html">Voltar ao portal</a>
    </div>
  </div>
</main>

<script>
"use strict";
const BACKEND=(typeof window!=='undefined'&&window.BACKEND_URL?String(window.BACKEND_URL).trim():'');

const AREAS=[
  {key:'calcado', nome:'Cal\u00E7ado', lu:'footprints', tarefas:[
    'Arrumar balc\u00E3o Sneaker',
    'Aspirar e limpar o balc\u00E3o',
    'Limpeza do p\u00F3 (light boxes, tri-fisher, prateleiras)',
    'Esvaziar caixotes do lixo',
    'Aspirar debaixo da cinta (abrir grade)',
    'Levantar os bancos para limpar',
    'Limpeza dos espelhos',
    'Imprimir senhas',
    'Repor Sprays'
  ]},
  {key:'textil', nome:'T\u00EAxtil', lu:'shirt', tarefas:[
    'Aspirar laterais por baixo da roupa',
    'Limpar o p\u00F3 de prateleiras e expositores',
    'Aspirar e limpar os 6 provadores',
    'Organizar e limpar arm\u00E1rio dos provadores',
    'Organizar sinal\u00E9tica das gavetas',
    'Arrumar cabides (incluindo os de nata\u00E7\u00E3o)',
    'Esvaziar caixotes do lixo'
  ]},
  {key:'caixa', nome:'Caixa', lu:'receipt', tarefas:[
    'Limpar o balc\u00E3o de caixa',
    'Limpar terminais, teclados e ecr\u00E3s',
    'Aspirar / varrer atr\u00E1s do balc\u00E3o',
    'Arrumar zona de embalamento (sacos)',
    'Arrumar gavetas',
    'Verificar reservas',
    'Repor consum\u00EDveis (sacos reutiliz\u00E1veis, rolos)'
  ]},
  {key:'logistica', nome:'Log\u00EDstica', lu:'package', tarefas:[
    'Preencher folha de reposi\u00E7\u00E3o',
    'Identificar caixas do template da empresa',
    'Organizar e limpar o buraco',
    'Limpeza do p\u00F3 e do ch\u00E3o do armaz\u00E9m',
    'Arrumar estante/m\u00F3vel e gavetas',
    'Perfilar/arrumar caixas e cart\u00E3o',
    'Esvaziar caixotes do lixo'
  ]}
];

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function render(){
  const root=document.getElementById('areas'); root.innerHTML='';
  AREAS.forEach(function(a){
    const card=document.createElement('div'); card.className='area'; card.dataset.key=a.key;
    let tasks='';
    a.tarefas.forEach(function(t,i){
      tasks+='<label class="task"><input type="checkbox" data-area="'+a.key+'" data-i="'+i+'"><span class="box"></span><span class="tt">'+esc(t)+'</span></label>';
    });
    card.innerHTML=
      '<div class="area-head"><span class="area-ic"><i data-lu="'+a.lu+'" data-sz="22"></i></span><h2>'+esc(a.nome)+'</h2><span class="area-prog" id="prog-'+a.key+'">0/'+a.tarefas.length+'</span></div>'+
      '<button class="area-all" data-area="'+a.key+'">Marcar todas</button>'+
      '<div class="tasks">'+tasks+'</div>';
    root.appendChild(card);
  });
  root.querySelectorAll('input[type=checkbox]').forEach(function(c){ c.addEventListener('change', update); });
  root.querySelectorAll('.area-all').forEach(function(b){
    b.addEventListener('click', function(){
      const key=b.dataset.area;
      const boxes=root.querySelectorAll('input[data-area="'+key+'"]');
      const allOn=[].every.call(boxes, x=>x.checked);
      boxes.forEach(function(x){ x.checked=!allOn; });
      b.textContent = allOn ? 'Marcar todas' : 'Desmarcar todas';
      update();
    });
  });
  update();
}

function update(){
  let total=0, done=0;
  AREAS.forEach(function(a){
    const boxes=document.querySelectorAll('input[data-area="'+a.key+'"]');
    let d=0; boxes.forEach(function(x){ if(x.checked) d++; });
    total+=boxes.length; done+=d;
    document.getElementById('prog-'+a.key).textContent=d+'/'+boxes.length;
  });
  document.getElementById('summary').textContent= done+' de '+total+' tarefas marcadas';
}

function coletar(){
  return AREAS.map(function(a){
    return { nome:a.nome, tarefas: a.tarefas.map(function(t,i){
      const c=document.querySelector('input[data-area="'+a.key+'"][data-i="'+i+'"]');
      return { t:t, ok: !!(c&&c.checked) };
    })};
  });
}

document.getElementById('btnSubmit').addEventListener('click', function(){
  const nome=document.getElementById('nome').value.trim();
  if(!nome){ alert('Por favor escreve o teu nome.'); document.getElementById('nome').focus(); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem (config em falta). Avisa o respons\u00E1vel.'); return; }
  const btn=this; btn.disabled=true; btn.textContent='A enviar\u2026';
  const payload={
    action:'limpeza',
    nome:nome,
    obs:document.getElementById('obs').value.trim(),
    data:new Date().toISOString(),
    areas:coletar()
  };
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)})
    .then(function(r){return r.json();})
    .then(function(j){
      if(j&&j.ok&&j.limpeza){
        document.getElementById('form').style.display='none';
        document.getElementById('okMsg').textContent='Obrigado, '+nome+'! O respons\u00E1vel foi avisado por email.';
        document.getElementById('ok').style.display='block';
        window.scrollTo(0,0);
      }else if(j&&j.ok){
        alert('O envio da limpeza ainda n\u00E3o est\u00E1 ativo no servidor. Avisa o respons\u00E1vel para terminar a configura\u00E7\u00E3o.');
        btn.disabled=false; btn.textContent='Confirmar limpeza';
      }else{ throw new Error((j&&j.error)||'erro'); }
    })
    .catch(function(){
      alert('N\u00E3o foi poss\u00EDvel enviar. Verifica a internet e tenta de novo.');
      btn.disabled=false; btn.textContent='Confirmar limpeza';
    });
});

render();
</script>
