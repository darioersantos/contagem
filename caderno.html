<script src="roster.js"></script>

<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:760px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .h-actions{display:flex;gap:8px;flex:none;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 24px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin:12px 0;}
  .intro{font-size:13px;color:var(--muted);margin:2px 2px 6px;}
  .priv{display:inline-flex;align-items:center;gap:6px;background:#fff4e8;color:var(--accent-ink);border:1px solid var(--accent-soft);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:700;margin:2px;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field textarea{min-height:80px;resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
  .two{display:flex;gap:12px;flex-wrap:wrap;}
  .two .field{flex:1;min-width:150px;}
  .sec-t{font-size:13px;font-weight:800;color:var(--accent-dark);margin:0 0 10px;display:flex;align-items:center;gap:8px;}

  #ficha{display:none;}
  .hint-pick{text-align:center;color:var(--muted);font-size:14px;padding:30px 14px;}

  /* conversas */
  .conv-add .crow{display:flex;gap:10px;flex-wrap:wrap;}
  .conv-add .crow .field{flex:1 1 140px;min-width:0;margin-bottom:10px;}
  .conv-add .crow .f-data{flex:0 0 160px;}
  @media(max-width:480px){ .conv-add .crow{flex-direction:column;} .conv-add .crow .field{flex:1 1 auto;width:100%;} }
  .conv{border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-top:10px;background:#faf7f2;}
  .conv .ch{display:flex;align-items:center;gap:8px;font-size:13px;}
  .conv .ch .cd{font-weight:800;color:var(--accent-dark);}
  .conv .ch .ct{font-weight:700;}
  .conv .ch .cdel{margin-left:auto;background:none;border:none;color:var(--neg);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
  .conv .cn{font-size:14px;margin-top:5px;white-space:pre-wrap;word-break:break-word;}

  /* competencias */
  .comp-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .comp-item:last-child{border-bottom:none;}
  .comp-item .lvl{margin-left:auto;font-size:12px;font-weight:800;padding:3px 9px;border-radius:999px;}
  .lvl.l1{background:#fde8e8;color:#b91c1c;}
  .lvl.l2{background:#fef3cd;color:#9a6700;}
  .comp-ok{font-size:13px;color:var(--pos);font-weight:700;}
  .comp-link{display:inline-block;margin-top:10px;font-size:13px;font-weight:800;color:var(--accent-dark);text-decoration:none;}

  .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .btn{flex:1;min-width:150px;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
  .btn.save{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(230,98,0,.3);}
  .btn.print{background:#fff;border:2px solid var(--accent);color:var(--accent-dark);}
  .status{text-align:center;font-size:12px;color:var(--muted);margin-top:8px;min-height:14px;}

  /* Impressao */
  #printArea{display:none;}
  @media print{
    @page{size:A4;margin:15mm 14mm;}
    header,main>.card,main>.intro,main>.actions,.status{display:none !important;}
    #printArea{display:block !important;color:#000;}
    #printArea h1{font-size:22px;margin:0;}
    #printArea .psub{font-size:13px;color:#555;margin:2px 0 14px;border-bottom:2px solid #FF8100;padding-bottom:8px;}
    #printArea h2{font-size:13px;margin:16px 0 4px;color:#8a4500;text-transform:uppercase;letter-spacing:.04em;}
    #printArea .who td{padding:4px;font-size:14px;}
    #printArea .who td.k{color:#555;width:150px;}
    #printArea .who td.v{font-weight:800;}
    #printArea p{font-size:13.5px;white-space:pre-wrap;margin:4px 0;}
    #printArea table.conv{width:100%;border-collapse:collapse;margin-top:6px;}
    #printArea table.conv td{border:1px solid #ddd;padding:6px 8px;font-size:12.5px;vertical-align:top;}
    #printArea table.conv td.d{width:70px;font-weight:800;color:#8a4500;}
    #printArea table.conv td.t{width:130px;font-weight:700;}
  }
</style>
</head>

<header>

const BACKEND=(typeof window!=='undefined'&&window.BACKEND_URL?String(window.BACKEND_URL).trim():'');
const SEC='_caderno';
const TOPICOS=['CAIXA','ENTRADA PROCEDIMENTOS','SNEAKERS BALC\u00C3O','ARMAZ\u00C9M CAL\u00C7ADO','USO DO GPC','PREPARA\u00C7\u00C3O ONLINE LS','PROCEDIMENTO PROVADORES','VENDAS POR METRO','SALES FORCE (CRIAR E CONSULTAR)','REC. MOBSHOP CAMI\u00C3O','TRANSFER\u00CANCIAS','DPD','GARLAND','TIBCO'];
const NIVEIS={1:'Em forma\u00E7\u00E3o',2:'Com supervis\u00E3o',3:'Aut\u00F3nomo'};

function today(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function setStatus(t){ var e=document.getElementById('status'); if(e) e.textContent=t||''; }
function fmtData(s){ var d=new Date((s||'')+'T00:00:00'); return isNaN(d)?(s||''):d.toLocaleDateString('pt-PT'); }

var current='';        // nome do colaborador
var data=blankData();  // dados do caderno atual
var oldIds=[];         // notas antigas deste colaborador (limpar ao guardar)
var compM={};          // matriz de competencias

function blankData(){ return {funcao:'', desde:'', fortes:'', desenvolver:'', conversas:[]}; }
function showFicha(on){ document.getElementById('ficha').style.display=on?'block':'none'; document.getElementById('hintPick').style.display=on?'none':'block'; }

document.getElementById('colaborador').addEventListener('change',function(){ loadFor(this.value); });

function loadFor(name){
  current=name; data=blankData(); oldIds=[]; compM={};
  if(!name){ showFicha(false); return; }
  if(!BACKEND){ paint(); showFicha(true); setStatus('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  setStatus('A carregar\u2026');
  fetch(BACKEND+'?action=notas&t='+Date.now()).then(function(r){return r.json();}).then(function(j){
    if(j&&j.ok&&Array.isArray(j.notas)){
      var cads=j.notas.filter(function(n){return String(n.seccao)===SEC && String(n.autor)===name;})
        .sort(function(a,b){return new Date(b.data)-new Date(a.data);});
      oldIds=cads.map(function(n){return n.id;});
      if(cads.length){ try{ data=Object.assign(blankData(), JSON.parse(cads[0].texto||'{}')); if(!Array.isArray(data.conversas)) data.conversas=[]; }catch(e){} }
      var comps=j.notas.filter(function(n){return String(n.seccao)==='_comp';})
        .sort(function(a,b){return new Date(b.data)-new Date(a.data);});
      if(comps.length){ try{ compM=JSON.parse(comps[0].texto||'{}')||{}; }catch(e){} }
    }
    paint(); showFicha(true); setStatus('');
  }).catch(function(){ paint(); showFicha(true); setStatus('Sem liga\u00E7\u00E3o. Recarrega.'); });
}

function paint(){
  document.getElementById('funcao').value=data.funcao||'';
  document.getElementById('desde').value=data.desde||'';
  document.getElementById('fortes').value=data.fortes||'';
  document.getElementById('desenvolver').value=data.desenvolver||'';
  document.getElementById('cData').value=today();
  document.getElementById('cTema').value='';
  document.getElementById('cNotas').value='';
  pintaConversas(); pintaComp();
}
function pintaConversas(){
  var l=document.getElementById('convList'); l.innerHTML='';
  var arr=(data.conversas||[]).slice().sort(function(a,b){return new Date(b.data)-new Date(a.data);});
  if(!arr.length){ l.innerHTML='<p class="intro" style="margin:10px 0 0;">Ainda sem conversas registadas.</p>'; return; }
  arr.forEach(function(c){
    var div=document.createElement('div'); div.className='conv';
    div.innerHTML='<div class="ch"><span class="cd">'+esc(fmtData(c.data))+'</span><span class="ct">'+esc(c.tema||'')+'</span><button class="cdel" type="button">\u2715</button></div>'+(c.notas?'<div class="cn">'+esc(c.notas)+'</div>':'');
    div.querySelector('.cdel').onclick=function(){
      var i=data.conversas.indexOf(c); if(i<0){ // procurar por igualdade
        data.conversas=data.conversas.filter(function(x){return !(x.data===c.data&&x.tema===c.tema&&x.notas===c.notas);});
      } else data.conversas.splice(i,1);
      pintaConversas();
    };
    l.appendChild(div);
  });
}
function pintaComp(){
  var box=document.getElementById('compBox');
  var row=compM[current]||{};
  var reforcar=[];
  for(var ti=0;ti<TOPICOS.length;ti++){ var lv=+row[ti]||0; if(lv===1||lv===2) reforcar.push({t:TOPICOS[ti],lv:lv}); }
  if(!Object.keys(row).length){ box.innerHTML='<p class="intro" style="margin:0;">Sem dados no Mapa de Compet\u00EAncias para este colaborador.</p>'; return; }
  if(!reforcar.length){ box.innerHTML='<p class="comp-ok">\u2713 Aut\u00F3nomo em todos os t\u00F3picos avaliados.</p>'; return; }
  var h='<p class="intro" style="margin:0 0 6px;">\u00C1reas a refor\u00E7ar (do Mapa de Compet\u00EAncias):</p>';
  reforcar.forEach(function(r){ h+='<div class="comp-item"><span>'+esc(r.t)+'</span><span class="lvl l'+r.lv+'">'+NIVEIS[r.lv]+'</span></div>'; });
  box.innerHTML=h;
}

/* sincronizar campos de texto -> data */
['funcao','desde','fortes','desenvolver'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(){ data[id]=this.value; });
});

/* adicionar conversa */
document.getElementById('btnConv').addEventListener('click',function(){
  var d=document.getElementById('cData').value||today();
  var tema=document.getElementById('cTema').value.trim();
  var notas=document.getElementById('cNotas').value.trim();
  if(!tema && !notas){ alert('Escreve o tema ou as notas da conversa.'); return; }
  data.conversas.push({data:d, tema:tema, notas:notas});
  document.getElementById('cTema').value=''; document.getElementById('cNotas').value=''; document.getElementById('cData').value=today();
  pintaConversas();
});

/* guardar (1 registo por colaborador: adiciona novo, apaga antigos) */
document.getElementById('btnSave').addEventListener('click',function(){
  if(!current){ alert('Escolhe um colaborador.'); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  // garantir captura dos campos de texto
  data.funcao=document.getElementById('funcao').value;
  data.desde=document.getElementById('desde').value;
  data.fortes=document.getElementById('fortes').value;
  data.desenvolver=document.getElementById('desenvolver').value;
  var btn=this, old=btn.textContent; btn.disabled=true; btn.textContent='A guardar\u2026'; setStatus('');
  var aLimpar=oldIds.slice();
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:SEC, autor:current, texto:JSON.stringify(data)})})
    .then(function(r){return r.json();}).then(function(j){
      if(!(j&&j.ok)) throw 0;
      // apagar versoes antigas
      var dels=aLimpar.map(function(id){ return fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'nota_del', id:id})}).catch(function(){}); });
      Promise.all(dels).then(function(){
        btn.textContent='\u2713 Guardado'; setTimeout(function(){ btn.textContent=old; btn.disabled=false; },1600);
        loadFor(current); // re-sincroniza ids
      });
    })
    .catch(function(){ btn.disabled=false; btn.textContent=old; alert('N\u00E3o foi poss\u00EDvel guardar. Tenta de novo.'); });
});

/* imprimir */
function montarPrint(){
  var row=compM[current]||{}; var reforcar=[];
  for(var ti=0;ti<TOPICOS.length;ti++){ var lv=+row[ti]||0; if(lv===1||lv===2) reforcar.push(TOPICOS[ti]+' ('+NIVEIS[lv]+')'); }
  var conv='';
  (data.conversas||[]).slice().sort(function(a,b){return new Date(b.data)-new Date(a.data);}).forEach(function(c){
    conv+='<tr><td class="d">'+esc(fmtData(c.data))+'</td><td class="t">'+esc(c.tema||'')+'</td><td>'+esc(c.notas||'')+'</td></tr>';
  });
  var html='<h1>Caderno de Acompanhamento</h1><div class="psub">Sport Zone \u00B7 Vasco da Gama \u2014 privado da dire\u00E7\u00E3o</div>'
    +'<table class="who"><tbody>'
    +'<tr><td class="k">Colaborador</td><td class="v">'+esc(current||'\u2014')+'</td></tr>'
    +'<tr><td class="k">Fun\u00E7\u00E3o</td><td class="v">'+esc(data.funcao||'\u2014')+'</td></tr>'
    +'<tr><td class="k">Na equipa desde</td><td class="v">'+esc(data.desde||'\u2014')+'</td></tr>'
    +'</tbody></table>'
    +'<h2>Pontos fortes</h2><p>'+esc(data.fortes||'\u2014')+'</p>'
    +'<h2>A desenvolver</h2><p>'+esc(data.desenvolver||'\u2014')+'</p>'
    +'<h2>Registo de conversas</h2>'+(conv?'<table class="conv"><tbody>'+conv+'</tbody></table>':'<p>\u2014</p>')
    +'<h2>Liga\u00E7\u00E3o ao Mapa de Compet\u00EAncias</h2><p>'+(reforcar.length?('A refor\u00E7ar: '+esc(reforcar.join('; '))):'Aut\u00F3nomo nos t\u00F3picos avaliados ou sem dados.')+'</p>';
  document.getElementById('printArea').innerHTML=html;
}
function imprimir(){ if(!current){ alert('Escolhe um colaborador.'); return; } montarPrint(); setTimeout(function(){ window.print(); },120); }
document.getElementById('btnPrint').addEventListener('click',imprimir);
document.getElementById('btnPrintTop').addEventListener('click',imprimir);

showFicha(false);
</script>
</body>
</html>
