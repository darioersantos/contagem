<script>if(sessionStorage.getItem('portalOK')!=='1')location.replace('index.html');</script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--red:#e11d2b;--pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:14px 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:880px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;display:flex;align-items:center;gap:7px;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}
  .hbadge{display:inline-flex;align-items:center;justify-content:center;min-width:21px;height:21px;padding:0 5px;background:var(--red);color:#fff;border-radius:999px;font-size:12px;font-weight:800;box-shadow:0 1px 3px rgba(0,0,0,.25);}

  main{max-width:880px;margin:0 auto;padding:12px 12px 20px;}

  .add{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:14px;margin:4px 0 16px;}
  .add textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);min-height:64px;resize:vertical;}
  .add textarea:focus{outline:none;border-color:var(--accent);}
  .add .row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;align-items:center;}
  .add input[type=text]{flex:1;min-width:150px;border:1.5px solid var(--line);border-radius:12px;padding:11px;font-size:15px;font-family:inherit;background:#fff;}
  .add select{border:1.5px solid var(--line);border-radius:12px;padding:11px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);}
  .add input:focus,.add select:focus{outline:none;border-color:var(--accent);}
  .add button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:11px 16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
  .add button:disabled{opacity:.6;}
  #btnFoto{background:#fff;border:1.5px solid var(--line);color:var(--accent-dark);}
  #fotoPrev{margin-top:11px;display:none;align-items:center;gap:10px;}
  #fotoPrev img{width:80px;height:80px;object-fit:cover;border-radius:10px;border:1px solid var(--line);}
  #fotoPrev button{background:#fff;border:1.5px solid var(--line);color:var(--neg);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

  .grp{margin:18px 0;}
  .grp-h{font-size:13px;font-weight:800;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.04em;margin:0 2px 8px;display:flex;align-items:center;gap:8px;}
  .grp-h .grp-c{background:var(--accent-soft);color:var(--accent-ink);border-radius:999px;padding:1px 9px;font-size:12px;}

  .note{position:relative;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:14px;box-shadow:var(--shadow);padding:13px 15px;margin:10px 0;}
  .note .txt{font-size:15px;white-space:pre-wrap;word-break:break-word;}
  .note .thumb{display:block;margin-top:9px;width:84px;height:84px;object-fit:cover;border-radius:10px;cursor:zoom-in;border:1px solid var(--line);}
  .note .meta{display:flex;align-items:center;gap:10px;margin-top:11px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
  .note .meta b{color:var(--accent-dark);}
  .note .acts{margin-left:auto;display:flex;gap:6px;}
  .note .concluir{background:var(--pos);color:#fff;border:none;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;}
  .note .del{background:none;border:none;color:var(--neg);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
  .note.done{background:#f4f6f4;border-left-color:#bcc7bc;opacity:.85;}
  .note.done .txt{text-decoration:line-through;color:var(--muted);}
  .note.done .concluir{background:#fff;color:var(--muted);border:1.5px solid var(--line);}
  .feito{display:inline-block;background:#dcfce7;color:var(--pos);font-size:10px;font-weight:800;border-radius:999px;padding:2px 9px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:7px;}

  .note .comentar{background:#fff;border:1.5px solid var(--line);color:var(--accent-dark);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;}
  .note .coments{margin-top:8px;}
  .note .com{background:#faf7f2;border:1px solid var(--line);border-radius:10px;padding:8px 11px;margin-top:6px;}
  .note .com-t{display:block;font-size:13px;white-space:pre-wrap;word-break:break-word;}
  .note .com-m{display:block;margin-top:3px;font-size:11px;color:var(--muted);}
  .note .com-del{background:none;border:none;color:var(--neg);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
  .note .cbox{margin-top:9px;}
  .note .cbox textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:9px;font-size:14px;font-family:inherit;min-height:46px;resize:vertical;background:#fff;}
  .note .cbox textarea:focus{outline:none;border-color:var(--accent);}
  .note .cb-row{display:flex;gap:8px;margin-top:7px;}
  .note .cb-nome{flex:1;min-width:0;border:1.5px solid var(--line);border-radius:10px;padding:9px;font-size:13px;font-family:inherit;background:#fff;}
  .note .cb-nome:focus{outline:none;border-color:var(--accent);}
  .note .cb-send{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}

  .empty{text-align:center;color:var(--muted);padding:30px 16px;font-size:14px;}
  .status{text-align:center;color:var(--muted);font-size:13px;padding:10px;}

  #lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;padding:16px;cursor:zoom-out;}
  #lightbox img{max-width:100%;max-height:100%;border-radius:8px;}

  @keyframes saltita{0%,60%,100%{transform:translateY(0);}15%{transform:translateY(-6px);}30%{transform:translateY(0);}45%{transform:translateY(-3px);}}
  .hbadge{animation:saltita 1.4s ease-in-out infinite;}

  /* Impressao: lista de tarefas por fazer */
  #printArea{display:none;}
  @media print{
    @page{size:A4;margin:16mm 14mm;}
    header,.add,#lista,#lightbox{display:none !important;}
    #printArea{display:block !important;color:#000;font-size:13px;}
    #printArea h1{font-size:18px;margin:0 0 2px;color:#000;}
    #printArea .pdia{font-size:25px;font-weight:800;color:#1a1303;margin:0 0 2px;text-transform:capitalize;}
    #printArea .psub{font-size:12px;color:#555;margin-bottom:14px;border-bottom:2px solid #FF8100;padding-bottom:8px;}
    #printArea h2{font-size:14px;margin:16px 0 6px;color:#8a4500;}
    #printArea ul{list-style:none;margin:0;padding:0;}
    #printArea li{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #eee;page-break-inside:avoid;}
    #printArea .box{flex:none;width:14px;height:14px;border:1.5px solid #333;border-radius:3px;margin-top:1px;}
    #printArea i{color:#555;font-style:italic;}
  }
</style>
</head>

<div id="printArea"></div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lbImg" alt="foto"></div>

<script>
"use strict";
const BACKEND=(typeof window!=='undefined'&&window.BACKEND_URL?String(window.BACKEND_URL).trim():'');
const IMGSEP='||IMG||';
const COMENTSEP='@@';
const SECS=[
  {k:'geral',     nm:'Geral',     ic:'\u{1F4CB}'},
  {k:'calcado',   nm:'Cal\u00E7ado',   ic:'\u{1F45F}'},
  {k:'textil',    nm:'T\u00EAxtil',    ic:'\u{1F455}'},
  {k:'visual',    nm:'Visual',    ic:'\u{1F5BC}\uFE0F'},
  {k:'caixa',     nm:'Caixa',     ic:'\u{1F9FE}'},
  {k:'logistica', nm:'Log\u00EDstica', ic:'\u{1F4E6}'}
];
let NOTAS=[];
let COMENTARIOS=[];
let pendingFoto='';

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtData(d){ try{ return new Date(d).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
function isDone(n){ return n.done===true || String(n.done).toLowerCase()==='true'; }
function pendentes(){ return NOTAS.filter(n=>!isDone(n)).length; }
function parteTexto(raw){ raw=raw||''; var i=raw.indexOf(IMGSEP); return i>=0?raw.slice(0,i):raw; }
function parteFoto(raw){ raw=raw||''; var i=raw.indexOf(IMGSEP); return i>=0?raw.slice(i+IMGSEP.length):''; }

function preencherSeccoes(){
  const sel=document.getElementById('seccao'); sel.innerHTML='';
  SECS.forEach(function(s){ const o=document.createElement('option'); o.value=s.k; o.textContent=s.ic+' '+s.nm; sel.appendChild(o); });
}

function render(){
  const l=document.getElementById('lista'); l.innerHTML='';
  let any=false;
  SECS.forEach(function(s){
    let itens=NOTAS.filter(n=>n.seccao===s.k);
    if(!itens.length) return;
    any=true;
    itens.sort(function(a,b){ const da=isDone(a),db=isDone(b); if(da!==db) return da?1:-1; return new Date(b.data)-new Date(a.data); });
    const grp=document.createElement('div'); grp.className='grp';
    const porFazer=itens.filter(n=>!isDone(n)).length;
    grp.innerHTML='<div class="grp-h">'+s.ic+' '+esc(s.nm)+' <span class="grp-c">'+porFazer+' por fazer</span></div>';
    itens.forEach(function(n){
      const done=isDone(n);
      const txt=parteTexto(n.texto), img=parteFoto(n.texto);
      const coms=COMENTARIOS.filter(function(x){return x.parent===String(n.id);}).sort(function(a,b){return new Date(a.data)-new Date(b.data);});
      let comsHtml='';
      coms.forEach(function(cm){ comsHtml+='<div class="com"><span class="com-t">'+esc(cm.texto)+'</span><span class="com-m">\u{1F4AC} '+(cm.autor?esc(cm.autor)+' \u00B7 ':'')+fmtData(cm.data)+' <button class="com-del" data-id="'+esc(cm.id)+'">\u2715</button></span></div>'; });
      const c=document.createElement('div'); c.className='note'+(done?' done':'');
      c.innerHTML=(done?'<span class="feito">\u2713 Conclu\u00EDdo</span><br>':'')+
        (txt?'<div class="txt">'+esc(txt)+'</div>':'')+
        (img?'<img class="thumb" alt="foto">':'')+
        '<div class="meta"><b>'+esc(n.autor||'\u2014')+'</b> \u00B7 '+fmtData(n.data)+
        '<span class="acts">'+
          '<button class="concluir">'+(done?'\u21A9 Reabrir':'\u2713 Concluir')+'</button>'+
          '<button class="comentar">\u{1F4AC} Comentar</button>'+
          '<button class="del">\u2715 Apagar</button>'+
        '</span></div>'+
        '<div class="coments">'+comsHtml+'</div>'+
        '<div class="cbox" style="display:none">'+
          '<textarea class="cb-txt" placeholder="Escreve um coment\u00E1rio/nota..."></textarea>'+
          '<div class="cb-row"><input class="cb-nome" type="text" placeholder="O teu nome (opcional)"><button class="cb-send" type="button">Enviar</button></div>'+
        '</div>';
      if(img){ const th=c.querySelector('.thumb'); th.src=img; th.onclick=function(){ abrirFoto(img); }; }
      c.querySelector('.concluir').onclick=function(){ concluir(n.id, !done); };
      c.querySelector('.del').onclick=function(){ apagar(n.id); };
      const cbox=c.querySelector('.cbox');
      c.querySelector('.comentar').onclick=function(){ const open=cbox.style.display==='none'; cbox.style.display=open?'block':'none'; if(open) c.querySelector('.cb-txt').focus(); };
      c.querySelector('.cb-send').onclick=function(){ enviarComentario(n.id, c.querySelector('.cb-txt').value, c.querySelector('.cb-nome').value, this); };
      c.querySelectorAll('.com-del').forEach(function(b){ b.onclick=function(){ apagarComentario(b.dataset.id); }; });
      grp.appendChild(c);
    });
    l.appendChild(grp);
  });
  if(!any){ l.innerHTML='<div class="empty">Sem lembretes. Escreve o primeiro acima \u{1F446}</div>'; }
  atualizarBadge();
}

function atualizarBadge(){
  const hb=document.getElementById('hdrBadge'); const p=pendentes();
  if(p){ hb.textContent=p; hb.style.display=''; } else { hb.style.display='none'; }
}

function carregar(){
  if(!BACKEND){ document.getElementById('lista').innerHTML='<div class="status">Sem liga\u00E7\u00E3o \u00E0 nuvem (config em falta).</div>'; return; }
  document.getElementById('lista').innerHTML='<div class="status">A carregar\u2026</div>';
  fetch(BACKEND+'?action=notas&t='+Date.now())
    .then(r=>r.json()).then(function(j){
      if(j&&j.ok&&Array.isArray(j.notas)){
        NOTAS=j.notas.filter(function(n){return String(n.seccao)!=='_aniversario' && String(n.seccao)!=='_comentario' && String(n.seccao)!=='_cofrehist' && String(n.seccao)!=='_hhhist' && String(n.seccao)!=='_pfhist';});
        COMENTARIOS=j.notas.filter(function(n){return String(n.seccao)==='_comentario';}).map(function(n){ var raw=String(n.texto||''); var i=raw.indexOf(COMENTSEP); return {id:n.id, parent:i>=0?raw.slice(0,i):'', texto:i>=0?raw.slice(i+COMENTSEP.length):raw, autor:n.autor, data:n.data}; });
        render();
      }
      else{ document.getElementById('lista').innerHTML='<div class="status">A zona de lembretes ainda n\u00E3o est\u00E1 ativa no servidor. Avisa o respons\u00E1vel.</div>'; }
    })
    .catch(function(){ document.getElementById('lista').innerHTML='<div class="status">Sem liga\u00E7\u00E3o. Verifica a internet e recarrega.</div>'; });
}

/* ---- Fotos ---- */
document.getElementById('btnFoto').addEventListener('click',function(){ document.getElementById('fileFoto').click(); });
document.getElementById('fileFoto').addEventListener('change',function(e){
  const f=e.target.files&&e.target.files[0]; e.target.value='';
  if(!f) return;
  comprimir(f, function(data){ pendingFoto=data; mostrarPrev(); });
});
function mostrarPrev(){
  const p=document.getElementById('fotoPrev');
  if(pendingFoto){ p.style.display='flex'; p.innerHTML='<img src="'+pendingFoto+'"><button type="button" id="fotoRem">\u2715 Remover foto</button>'; document.getElementById('fotoRem').onclick=function(){ pendingFoto=''; mostrarPrev(); }; }
  else { p.style.display='none'; p.innerHTML=''; }
}
function comprimir(file, cb){
  const img=new Image();
  img.onload=function(){
    const w=img.width, h=img.height;
    function gen(dim,q){ const s=Math.min(1,dim/Math.max(w,h)); const cw=Math.round(w*s),ch=Math.round(h*s); const c=document.createElement('canvas'); c.width=cw;c.height=ch; c.getContext('2d').drawImage(img,0,0,cw,ch); return c.toDataURL('image/jpeg',q); }
    let dim=900, q=0.6, data=gen(dim,q);
    while(data.length>46000 && (dim>320||q>0.35)){ if(q>0.4){ q-=0.1; } else { dim=Math.round(dim*0.85); q=0.55; } data=gen(dim,q); }
    cb(data);
  };
  img.onerror=function(){ alert('N\u00E3o foi poss\u00EDvel ler a imagem.'); };
  img.src=URL.createObjectURL(file);
}
function abrirFoto(src){ document.getElementById('lbImg').src=src; document.getElementById('lightbox').style.display='flex'; }

/* ---- Imprimir tarefas por fazer ---- */
document.getElementById('btnPrint').addEventListener('click',imprimir);
function imprimir(){
  const hoje=new Date().toLocaleDateString('pt-PT',{day:'2-digit',month:'long',year:'numeric'});
  let html='<h1>Tarefas do dia</h1><div class="pdia">'+esc(hoje)+'</div><div class="psub">Sport Zone &middot; Vasco da Gama</div>';
  let total=0;
  SECS.forEach(function(s){
    const itens=NOTAS.filter(function(n){return n.seccao===s.k && !isDone(n);});
    if(!itens.length) return;
    itens.sort(function(a,b){ return new Date(a.data)-new Date(b.data); });
    html+='<h2>'+s.ic+' '+esc(s.nm)+'</h2><ul>';
    itens.forEach(function(n){
      total++;
      const t=parteTexto(n.texto).trim() || '(foto)';
      html+='<li><span class="box"></span><span>'+esc(t)+(n.autor?' <i>\u2014 '+esc(n.autor)+'</i>':'')+'</span></li>';
    });
    html+='</ul>';
  });
  if(!total){ html+='<p>N\u00E3o h\u00E1 tarefas por fazer \u{1F389}</p>'; }
  document.getElementById('printArea').innerHTML=html;
  window.print();
}

document.getElementById('btnAdd').addEventListener('click',function(){
  const texto=document.getElementById('texto').value.trim();
  const autor=document.getElementById('autor').value.trim();
  const seccao=document.getElementById('seccao').value;
  if(!texto && !pendingFoto){ alert('Escreve o lembrete/tarefa ou anexa uma foto.'); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  const textoFinal = texto + (pendingFoto ? IMGSEP+pendingFoto : '');
  const btn=this; btn.disabled=true; btn.textContent='A guardar\u2026';
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:seccao, autor:autor, texto:textoFinal})})
    .then(r=>r.json()).then(function(j){
      if(j&&j.ok){ document.getElementById('texto').value=''; pendingFoto=''; mostrarPrev(); carregar(); }
      else throw new Error('erro');
    })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel guardar. Tenta de novo.'); })
    .then(function(){ btn.disabled=false; btn.textContent='\uFF0B Adicionar'; });
});

function concluir(id, done){
  const n=NOTAS.find(x=>String(x.id)===String(id)); if(!n) return;
  n.done=done; render();
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_done', id:id, done:done})})
    .then(r=>r.json()).then(function(j){ if(!j||!j.ok) throw new Error('erro'); })
    .catch(function(){ n.done=!done; render(); alert('N\u00E3o foi poss\u00EDvel atualizar. Tenta de novo.'); });
}

function apagar(id){
  if(!confirm('Apagar este lembrete?')) return;
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_del', id:id})})
    .then(r=>r.json()).then(function(){ NOTAS=NOTAS.filter(x=>String(x.id)!==String(id)); render(); })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel apagar. Tenta de novo.'); });
}

function enviarComentario(parentId, texto, autor, btn){
  texto=String(texto||'').trim(); autor=String(autor||'').trim();
  if(!texto){ alert('Escreve um coment\u00E1rio.'); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  if(btn){ btn.disabled=true; btn.textContent='A enviar\u2026'; }
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:'_comentario', autor:autor, texto:String(parentId)+COMENTSEP+texto})})
    .then(r=>r.json()).then(function(j){ if(j&&j.ok){ carregar(); } else throw new Error('erro'); })
    .catch(function(){ if(btn){ btn.disabled=false; btn.textContent='Enviar'; } alert('N\u00E3o foi poss\u00EDvel enviar. Tenta de novo.'); });
}

function apagarComentario(id){
  if(!confirm('Apagar este coment\u00E1rio?')) return;
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_del', id:id})})
    .then(r=>r.json()).then(function(){ COMENTARIOS=COMENTARIOS.filter(x=>String(x.id)!==String(id)); render(); })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel apagar.'); });
}

preencherSeccoes();
carregar();
