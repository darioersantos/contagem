<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FF8100">
<title>Lembretes &#xB7; Sport Zone Vasco da Gama</title>
<script src="config.js"></script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:14px 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:880px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  .tabs{display:flex;gap:8px;overflow-x:auto;padding:12px;max-width:880px;margin:0 auto;-webkit-overflow-scrolling:touch;}
  .tabs::-webkit-scrollbar{display:none;}
  .tabs button{flex:none;border:none;background:var(--card);color:var(--muted);padding:9px 15px;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);font-family:inherit;display:flex;align-items:center;gap:6px;}
  .tabs button.active{background:var(--accent);color:#fff;}
  .tabs button .cnt{background:rgba(0,0,0,.12);border-radius:999px;padding:0 7px;font-size:12px;}
  .tabs button.active .cnt{background:rgba(255,255,255,.28);}

  main{max-width:880px;margin:0 auto;padding:4px 12px 20px;}

  .add{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:14px;margin:8px 0 16px;}
  .add textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);min-height:64px;resize:vertical;}
  .add textarea:focus{outline:none;border-color:var(--accent);}
  .add .row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .add input{flex:1;min-width:140px;border:1.5px solid var(--line);border-radius:12px;padding:11px;font-size:15px;font-family:inherit;background:#fff;}
  .add input:focus{outline:none;border-color:var(--accent);}
  .add button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:11px 18px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
  .add button:disabled{opacity:.6;}

  .note{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:14px;box-shadow:var(--shadow);padding:13px 15px;margin:10px 0;}
  .note .txt{font-size:15px;white-space:pre-wrap;word-break:break-word;}
  .note .meta{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:12px;color:var(--muted);}
  .note .meta b{color:var(--accent-dark);}
  .note .del{margin-left:auto;background:none;border:none;color:var(--neg);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

  .empty{text-align:center;color:var(--muted);padding:30px 16px;font-size:14px;}
  .status{text-align:center;color:var(--muted);font-size:13px;padding:10px;}
</style>
</head>

<nav class="tabs" id="tabs"></nav>

<main>
  <div class="add">
    <textarea id="texto" placeholder="Escreve o lembrete para a pr&#xF3;xima chefia de turno..."></textarea>
    <div class="row">
      <input type="text" id="autor" placeholder="O teu nome" autocomplete="name">
      <button id="btnAdd">&#xFF0B; Adicionar</button>
    </div>
  </div>
  <div id="lista"></div>
</main>

<script>
"use strict";
const BACKEND=(typeof window!=='undefined'&&window.BACKEND_URL?String(window.BACKEND_URL).trim():'');
const SECS=[
  {k:'geral',     nm:'Geral',     ic:'\u{1F4CB}'},
  {k:'calcado',   nm:'Cal\u00E7ado',   ic:'\u{1F45F}'},
  {k:'textil',    nm:'T\u00EAxtil',    ic:'\u{1F455}'},
  {k:'caixa',     nm:'Caixa',     ic:'\u{1F9FE}'},
  {k:'logistica', nm:'Log\u00EDstica', ic:'\u{1F4E6}'}
];
let ativo='geral';
let NOTAS=[];

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtData(d){ try{ return new Date(d).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }

function renderTabs(){
  const t=document.getElementById('tabs'); t.innerHTML='';
  SECS.forEach(function(s){
    const n=NOTAS.filter(x=>x.seccao===s.k).length;
    const b=document.createElement('button');
    b.className='tab'+(s.k===ativo?' active':'');
    b.innerHTML=s.ic+' '+esc(s.nm)+(n?' <span class="cnt">'+n+'</span>':'');
    b.onclick=function(){ ativo=s.k; renderTabs(); renderLista(); };
    t.appendChild(b);
  });
}
function renderLista(){
  const l=document.getElementById('lista'); l.innerHTML='';
  const itens=NOTAS.filter(x=>x.seccao===ativo).sort((a,b)=>new Date(b.data)-new Date(a.data));
  if(!itens.length){ l.innerHTML='<div class="empty">Sem lembretes nesta sec\u00E7\u00E3o.<br>Escreve o primeiro acima \u{1F446}</div>'; return; }
  itens.forEach(function(n){
    const c=document.createElement('div'); c.className='note';
    c.innerHTML='<div class="txt">'+esc(n.texto)+'</div>'+
      '<div class="meta"><b>'+esc(n.autor||'\u2014')+'</b> \u00B7 '+fmtData(n.data)+
      '<button class="del" data-id="'+esc(n.id)+'">\u2715 Apagar</button></div>';
    c.querySelector('.del').onclick=function(){ apagar(n.id); };
    l.appendChild(c);
  });
}

function carregar(){
  if(!BACKEND){ document.getElementById('lista').innerHTML='<div class="status">Sem liga\u00E7\u00E3o \u00E0 nuvem (config em falta).</div>'; return; }
  document.getElementById('lista').innerHTML='<div class="status">A carregar\u2026</div>';
  fetch(BACKEND+'?action=notas&t='+Date.now())
    .then(r=>r.json()).then(function(j){
      if(j&&j.ok&&Array.isArray(j.notas)){ NOTAS=j.notas; renderTabs(); renderLista(); }
      else{ document.getElementById('lista').innerHTML='<div class="status">A zona de lembretes ainda n\u00E3o est\u00E1 ativa no servidor. Avisa o respons\u00E1vel.</div>'; }
    })
    .catch(function(){ document.getElementById('lista').innerHTML='<div class="status">Sem liga\u00E7\u00E3o. Verifica a internet e recarrega.</div>'; });
}

document.getElementById('btnAdd').addEventListener('click',function(){
  const texto=document.getElementById('texto').value.trim();
  const autor=document.getElementById('autor').value.trim();
  if(!texto){ alert('Escreve o lembrete.'); return; }
  if(!autor){ alert('Escreve o teu nome.'); document.getElementById('autor').focus(); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  const btn=this; btn.disabled=true; btn.textContent='A guardar\u2026';
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:ativo, autor:autor, texto:texto})})
    .then(r=>r.json()).then(function(j){
      if(j&&j.ok){ document.getElementById('texto').value=''; carregar(); }
      else throw new Error('erro');
    })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel guardar. Tenta de novo.'); })
    .then(function(){ btn.disabled=false; btn.textContent='\uFF0B Adicionar'; });
});

function apagar(id){
  if(!confirm('Apagar este lembrete?')) return;
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_del', id:id})})
    .then(r=>r.json()).then(function(){ NOTAS=NOTAS.filter(x=>String(x.id)!==String(id)); renderTabs(); renderLista(); })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel apagar. Tenta de novo.'); });
}

renderTabs(); renderLista(); carregar();
</script>
