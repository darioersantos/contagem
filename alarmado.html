<title>Alarmado &#xB7; Sport Zone Vasco da Gama</title>
<script src="config.js"></script>
<script src="lucide.js"></script>
<script src="roster.js"></script>
<script>if(sessionStorage.getItem('portalOK')!=='1')location.replace('index.html');</script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:760px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .h-actions{display:flex;gap:8px;flex:none;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 24px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin:12px 0;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent);}

  .intro{font-size:13px;color:var(--muted);margin:2px 2px 0;}
  .grp-h{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent-dark);font-weight:800;margin:18px 3px 2px;}

  .marca{border-bottom:1px solid var(--line);padding:12px 0;}
  .marca:last-child{border-bottom:none;}
  .marca .mn{font-size:14.5px;font-weight:800;margin-bottom:8px;}
  .zonas{display:flex;gap:7px;flex-wrap:wrap;}
  .zonas button{border:2px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:9px 14px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;}
  .zonas button:active{transform:scale(.96);}
  .zonas button.sel{background:var(--pos);border-color:var(--pos);color:#fff;}
  .zonas button.sel::before{content:"\2713";font-weight:800;}

  .total-card{background:#1a1303;color:#fff;border:none;}
  .total-card .trow{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:15px;font-weight:700;}
  .total-card .trow b{font-size:22px;font-weight:800;color:#ffb45e;}

  .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .btn{flex:1;min-width:150px;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
  .btn.save{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(230,98,0,.3);}
  .btn.print{background:#fff;border:2px solid var(--accent);color:var(--accent-dark);}
  .btn.reset{background:#fff;border:2px solid var(--line);color:var(--neg);}

  #histView{display:none;}
  body.av-hist main>.card,body.av-hist main>.actions,body.av-hist main>.intro,body.av-hist main>.grp-h,body.av-hist main>#grupos{display:none !important;}
  body.av-hist #histView{display:block;}
  .av-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-top:10px;background:#fff;}
  .av-info{flex:1;min-width:0;font-size:14px;}
  .av-info b{color:var(--accent-dark);}
  .av-sub{font-size:12px;color:var(--muted);margin-top:3px;}
  .av-acts{display:flex;flex-direction:column;gap:6px;flex:none;}
  .av-print{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
  .av-del{background:none;border:none;color:var(--neg);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

  /* Impressao em PDF */
  #printArea{display:none;}
  @media print{
    @page{size:A4;margin:14mm 13mm;}
    header,main>.card,main>.actions,main>.intro,main>.grp-h,main>#grupos,#histView{display:none !important;}
    #printArea{display:block !important;color:#000;}
    #printArea h1{font-size:21px;margin:0;}
    #printArea .psub{font-size:13px;color:#555;margin:2px 0 12px;border-bottom:2px solid #FF8100;padding-bottom:8px;}
    #printArea .who{width:100%;border-collapse:collapse;margin-bottom:12px;}
    #printArea .who td{padding:4px;font-size:13.5px;}
    #printArea .who td.k{color:#555;width:160px;}
    #printArea .who td.v{font-weight:800;}
    #printArea h2{font-size:12.5px;margin:12px 0 4px;color:#8a4500;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #eee;padding-bottom:3px;}
    #printArea .pm{font-size:13px;padding:3px 0;}
    #printArea .pm b{display:inline-block;min-width:130px;}
    #printArea .pm .z{color:#15803d;font-weight:700;}
    #printArea .pm .none{color:#bbb;}
  }
</style>
</head>

<header>

    {k:'m_puma',   n:'Puma',   zonas:['Parede','G\u00F4ndola','Guess','Formas']},
    {k:'m_reebok', n:'Reebok', zonas:['Parede','G\u00F4ndola','Guess','Formas']}
  ]},
  {t:'Moda J\u00FAnior', marcas:[
    {k:'j_nike',   n:'Nike',   zonas:['Parede','Mesa','Guess','G\u00F4ndola','Formas']},
    {k:'j_adidas', n:'Adidas', zonas:['Parede','G\u00F4ndola','Guess','Formas']},
    {k:'j_puma',   n:'Puma',   zonas:['Parede','G\u00F4ndola','Guess','Formas']}
  ]},
  {t:'Cal\u00E7ado', marcas:[
    {k:'c_podios', n:'P\u00F3dios e Outros', zonas:['Homem','Mulher','J\u00FAnior/Crian\u00E7a','Chinelos']}
  ]}
];

function today(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function defaults(){ return {nome:'', data:today(), checks:{}}; }
let st;
try{ st=Object.assign(defaults(), JSON.parse(localStorage.getItem(KEY))||{}); if(!st.checks) st.checks={}; }catch(e){ st=defaults(); }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(st)); }catch(e){} }

function has(k,z){ return !!(st.checks[k] && st.checks[k].indexOf(z)>=0); }
function toggle(k,z){
  if(!st.checks[k]) st.checks[k]=[];
  var i=st.checks[k].indexOf(z);
  if(i>=0){ st.checks[k].splice(i,1); if(!st.checks[k].length) delete st.checks[k]; }
  else st.checks[k].push(z);
}
function construir(){
  var box=document.getElementById('grupos'); var h='';
  GRUPOS.forEach(function(g){
    h+='<div class="grp-h">'+esc(g.t)+'</div><div class="card">';
    g.marcas.forEach(function(m){
      h+='<div class="marca"><div class="mn">'+esc(m.n)+'</div><div class="zonas">';
      m.zonas.forEach(function(z){
        h+='<button type="button" data-k="'+m.k+'" data-z="'+esc(z)+'"'+(has(m.k,z)?' class="sel"':'')+'>'+esc(z)+'</button>';
      });
      h+='</div></div>';
    });
    h+='</div>';
  });
  box.innerHTML=h;
  box.querySelectorAll('.zonas button').forEach(function(b){
    b.addEventListener('click',function(){
      toggle(b.dataset.k, b.dataset.z);
      b.classList.toggle('sel', has(b.dataset.k, b.dataset.z));
      save(); totais();
    });
  });
}
function somaTotal(d){ var s=0; var c=d.checks||{}; for(var k in c){ if(c.hasOwnProperty(k)) s+=c[k].length; } return s; }
function totais(){ document.getElementById('tTot').textContent=somaTotal(st); }

function pinta(){
  document.getElementById('nome').value=st.nome||'';
  document.getElementById('data').value=st.data||today();
}
document.getElementById('nome').addEventListener('change',function(){ st.nome=this.value; save(); });
document.getElementById('data').addEventListener('change',function(){ st.data=this.value; save(); });

/* ---------- imprimir ---------- */
function montarPrint(d){
  var dd=new Date((d.data||'')+'T00:00:00'); var ds=isNaN(dd)?(d.data||''):dd.toLocaleDateString('pt-PT');
  var body='';
  GRUPOS.forEach(function(g){
    body+='<h2>'+esc(g.t)+'</h2>';
    g.marcas.forEach(function(m){
      var sel=(d.checks&&d.checks[m.k])?d.checks[m.k]:[];
      var zonas = sel.length ? '<span class="z">'+sel.map(esc).join(', ')+'</span>' : '<span class="none">\u2014 n\u00E3o verificado</span>';
      body+='<div class="pm"><b>'+esc(m.n)+'</b> '+zonas+'</div>';
    });
  });
  var html='<h1>Controlo de Alarmado \u2014 Sport Zone Vasco da Gama</h1>'
    +'<div class="psub">Loja Vasco da Gama</div>'
    +'<table class="who"><tbody>'
    +'<tr><td class="k">Verificado por</td><td class="v">'+esc(d.nome||'\u2014')+'</td></tr>'
    +'<tr><td class="k">Data</td><td class="v">'+esc(ds)+'</td></tr>'
    +'<tr><td class="k">Zonas verificadas</td><td class="v">'+somaTotal(d)+'</td></tr>'
    +'</tbody></table>'+body;
  document.getElementById('printArea').innerHTML=html;
}
function imprimir(){ montarPrint(st); setTimeout(function(){ window.print(); },120); }
document.getElementById('btnPrint').addEventListener('click',imprimir);
document.getElementById('btnPrintTop').addEventListener('click',imprimir);

/* ---------- guardar na nuvem ---------- */
document.getElementById('btnSave').addEventListener('click',function(){
  if(!st.nome){ alert('Escolhe o teu nome.'); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  var payload={nome:st.nome, data:st.data, checks:st.checks, total:somaTotal(st)};
  var btn=this, old=btn.textContent; btn.disabled=true; btn.textContent='A guardar\u2026';
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:SEC, autor:st.nome+'|'+st.data, texto:JSON.stringify(payload)})})
    .then(function(r){return r.json();}).then(function(j){
      if(j&&j.ok){ btn.textContent='\u2713 Guardada'; setTimeout(function(){ btn.textContent=old; btn.disabled=false; },1600); }
      else throw 0;
    })
    .catch(function(){ btn.disabled=false; btn.textContent=old; alert('N\u00E3o foi poss\u00EDvel guardar. Tenta de novo.'); });
});

/* ---------- nova verificacao ---------- */
document.getElementById('btnReset').addEventListener('click',function(){
  if(!confirm('Come\u00E7ar uma nova verifica\u00E7\u00E3o? Os dados n\u00E3o guardados ser\u00E3o apagados.')) return;
  st=defaults(); save(); pinta(); construir(); totais();
});

/* ---------- historico ---------- */
let AV=[];
function abrirHist(){
  document.body.classList.add('av-hist');
  var l=document.getElementById('av-list');
  if(!BACKEND){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem liga\u00E7\u00E3o \u00E0 nuvem.</p>'; return; }
  l.innerHTML='<p style="color:var(--muted);font-size:13px;">A carregar\u2026</p>';
  fetch(BACKEND+'?action=notas&t='+Date.now())
    .then(function(r){return r.json();}).then(function(j){
      if(j&&j.ok&&Array.isArray(j.notas)){
        AV=j.notas.filter(function(n){return String(n.seccao)===SEC;})
          .map(function(n){ var d={}; try{ d=JSON.parse(n.texto||'{}'); }catch(e){} return {id:n.id, d:d, ts:n.data}; })
          .sort(function(a,b){ return new Date(b.ts)-new Date(a.ts); });
        renderHist();
      } else { l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem dados.</p>'; }
    }).catch(function(){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem liga\u00E7\u00E3o. Recarrega.</p>'; });
}
function renderHist(){
  var l=document.getElementById('av-list'); l.innerHTML='';
  if(!AV.length){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Ainda n\u00E3o h\u00E1 verifica\u00E7\u00F5es guardadas.</p>'; return; }
  AV.forEach(function(h){
    var d=h.d||{};
    var dd=new Date((d.data||'')+'T00:00:00'); var ds=isNaN(dd)?(d.data||''):dd.toLocaleDateString('pt-PT');
    var row=document.createElement('div'); row.className='av-row';
    row.innerHTML='<div class="av-info"><b>'+esc(d.nome||'\u2014')+'</b>'
      +'<div class="av-sub">'+esc(ds)+' \u00B7 '+(d.total==null?0:d.total)+' zonas verificadas</div></div>';
    var acts=document.createElement('div'); acts.className='av-acts';
    var bp=document.createElement('button'); bp.className='av-print'; bp.textContent='\uD83D\uDDA8\uFE0F Imprimir'; bp.onclick=function(){ montarPrint(d); setTimeout(function(){ window.print(); },120); };
    var bd=document.createElement('button'); bd.className='av-del'; bd.textContent='\u2715 Apagar'; bd.onclick=function(){ apagarHist(h.id); };
    acts.appendChild(bp); acts.appendChild(bd); row.appendChild(acts);
    l.appendChild(row);
  });
}
function apagarHist(id){
  if(!confirm('Apagar esta verifica\u00E7\u00E3o?')) return;
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_del', id:id})})
    .then(function(r){return r.json();}).then(function(){ AV=AV.filter(function(x){return String(x.id)!==String(id);}); renderHist(); })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel apagar.'); });
}
document.getElementById('btnHistView').addEventListener('click',abrirHist);
document.getElementById('histBack').addEventListener('click',function(){ document.body.classList.remove('av-hist'); });

/* ---------- arranque ---------- */
pinta(); construir(); totais();
</script>
</body>
</html>
