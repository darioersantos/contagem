<title>Checklists Abertura/Fecho &#xB7; Sport Zone Vasco da Gama</title>
<script src="config.js"></script>
<script src="lucide.js"></script>
<script src="roster.js"></script>
<script>if(sessionStorage.getItem('portalOK')!=='1')location.replace('index.html');</script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}body{overflow-x:clip;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:880px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 24px;}
  .intro{font-size:13px;color:var(--muted);margin:6px 2px 14px;}

  .area{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin:14px 0;overflow:hidden;}
  .area-head{display:flex;align-items:center;gap:11px;padding:13px 15px;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;}
  .area-ic{font-size:22px;}
  .area-head h2{font-size:17px;margin:0;font-weight:800;flex:1;}
  .area-prog{background:rgba(255,255,255,.22);padding:3px 10px;border-radius:999px;font-size:13px;font-weight:800;}
  .area-all{margin:12px 15px 4px;background:#fff;border:1.5px dashed var(--line);color:var(--accent-dark);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
  .tasks{padding:6px 8px 12px;}
  .task{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:11px;cursor:pointer;}
  .task:active{background:#faf8f5;}
  .task input{position:absolute;opacity:0;width:0;height:0;}
  .task .box{flex:none;width:26px;height:26px;border:2px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .12s;background:#fff;}
  .task .box::after{content:"\2713";color:#fff;font-size:17px;font-weight:900;opacity:0;}
  .task input:checked + .box{background:var(--pos);border-color:var(--pos);}
  .task input:checked + .box::after{opacity:1;}
  .task .tt{font-size:15px;line-height:1.25;}
  .task input:checked ~ .tt{color:var(--muted);text-decoration:line-through;}

  .field{margin:18px 2px 0;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
  .field textarea{min-height:130px;resize:vertical;}
  @media(max-width:560px){.field textarea{min-height:160px;}}

  .periodo-seg{display:flex;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px;margin:6px 0 12px;box-shadow:var(--shadow);}
  .periodo-seg button{flex:1;border:none;background:transparent;color:var(--muted);border-radius:10px;padding:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;}
  .periodo-seg button.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(230,98,0,.3);}
  .periodo-seg button i,.periodo-seg button svg{pointer-events:none;}
  .area.hide{display:none;}

  .summary{margin:18px 2px 0;padding:13px 15px;background:var(--accent-soft);color:var(--accent-ink);border-radius:12px;font-size:14px;font-weight:700;text-align:center;}

  .submit{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 16px rgba(230,98,0,.3);}
  .submit:disabled{opacity:.6;cursor:default;}
  .submit:active:not(:disabled){transform:scale(.99);}

  /* sucesso */
  #ok{display:none;text-align:center;padding:40px 20px;}
  #ok .big{font-size:64px;line-height:1;}
  #ok h2{font-size:22px;margin:16px 0 6px;}
  #ok p{color:var(--muted);font-size:15px;margin:0 0 22px;}
  #ok .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  #ok a,#ok button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:800;cursor:pointer;text-decoration:none;font-family:inherit;}
  #ok a.sec{background:#fff;color:var(--accent-dark);border:1.5px solid var(--line);}

  .printbtn{width:100%;margin-top:10px;background:#fff;color:var(--accent-dark);border:1.5px solid var(--line);border-radius:14px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;}
  .printbtn:active{transform:scale(.99);}

  .receipt{text-align:left;max-width:420px;margin:0 auto 22px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;}
  .receipt .r-row{display:flex;justify-content:space-between;gap:12px;font-size:14px;padding:6px 0;border-bottom:1px solid var(--line);}
  .receipt .r-row:last-child{border-bottom:none;}
  .receipt .r-k{color:var(--muted);font-weight:700;}
  .receipt .r-v{font-weight:800;color:var(--ink);text-align:right;}
  .receipt .r-v.ok{color:var(--pos);}
  .receipt .r-obs{font-size:13px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--line);}

  #histWrap{margin-top:22px;}
  #histWrap h3{font-size:13px;font-weight:800;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.04em;margin:0 2px 10px;display:flex;align-items:center;gap:7px;}
  .hrow{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:11px 13px;margin-bottom:9px;}
  .hrow .hinfo{flex:1;min-width:0;}
  .hrow .hnome{font-weight:800;color:var(--accent-dark);}
  .hrow .hsub{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.45;}
  .hrow .hdel{background:none;border:none;color:var(--neg);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex:none;padding:2px 4px;}
  #histEmpty{color:var(--muted);font-size:13px;padding:6px 2px;}
  #toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--pos);color:#fff;padding:13px 22px;border-radius:12px;font-weight:800;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:200;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #printArea{display:none;}
  @media print{
    header,#form,#ok{display:none !important;}
    #printArea{display:block;}
    #printArea .ph-head h1{font-size:18px;margin:0 0 2px;}
    #printArea .ph-date{font-size:13px;color:#222;margin-bottom:12px;}
    #printArea h2{font-size:15px;margin:16px 0 6px;border-bottom:1.5px solid #000;padding-bottom:3px;}
    #printArea .ph-tasks{list-style:none;padding:0;margin:0;}
    #printArea .ph-tasks li{display:flex;align-items:center;gap:11px;font-size:13.5px;padding:6px 0;}
    #printArea .ph-tasks .bx{width:17px;height:17px;border:1.6px solid #000;border-radius:3px;flex:none;}
    #printArea .ph-sign{margin-top:26px;font-size:13px;line-height:2.4;}
  }
</style>

<main>
  <div id="form">
    <p class="intro">Marca as tarefas feitas na abertura e no fecho da loja. No fim, seleciona o teu nome e guarda.</p>
    <div class="periodo-seg" id="periodoSeg">
      <button type="button" data-p="abertura" class="active"><i data-lu="sunrise"></i> Abertura</button>
      <button type="button" data-p="fecho"><i data-lu="moon"></i> Fecho</button>
    </div>
    <div id="areas"></div>

    <div class="field">
      <label for="nome">O teu nome *</label>
      <select id="nome" data-staff data-area="sup" data-ph="Seleciona o teu nome"></select>
    </div>
    <div class="field">
      <label for="obs">Observa&#xE7;&#xF5;es (opcional)</label>
      <textarea id="obs" placeholder="Algo a registar? (ex.: faltou material, avaria...)"></textarea>
    </div>

    <button class="submit" id="btnSubmit"><i data-lu="check"></i> Confirmar checklist</button>
    <button class="printbtn" id="btnPrint" type="button"><i data-lu="printer"></i> Imprimir lista de tarefas do dia</button>

    <div id="histWrap">
      <h3><i data-lu="history" data-sz="15"></i> Registos da abertura/fecho</h3>
      <div id="hist"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<div id="printArea"></div>

<script>
"use strict";
const BACKEND=(typeof window!=='undefined'&&window.BACKEND_URL?String(window.BACKEND_URL).trim():'');

const AREAS=[
  {key:'abertura', nome:'Abertura', lu:'sunrise', tarefas:[
    'Dar a volta \u00E0 loja ver necessidades',
    'Fazer VDL (Florisbela)',
    'Contagem cofre',
    'Contagem ingresso',
    'Imprimir briefing e preencher',
    'Colar o F12',
    'Planear entrada de loja no turno da manh\u00E3'
  ]},
  {key:'fecho', nome:'Fecho', lu:'moon', tarefas:[
    'Zebras e r\u00E1dios a carregar',
    'Sem equipamentos da loja "perdidos"',
    '\u00C1rea Social arrumada',
    'Provadores arrumados',
    'Portas abertas dos provadores'
  ]}
];

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function render(){
  const root=document.getElementById('areas'); root.innerHTML='';
  AREAS.forEach(function(a,idx){
    const card=document.createElement('div'); card.className='area'+(idx===0?'':' hide'); card.dataset.key=a.key;
    let tasks='';
    a.tarefas.forEach(function(t,i){
      tasks+='<label class="task"><input type="checkbox" data-area="'+a.key+'" data-i="'+i+'"><span class="box"></span><span class="tt">'+esc(t)+'</span></label>';
    });
    card.innerHTML=
      '<div class="area-head"><span class="area-ic"><i data-lu="'+a.lu+'" data-sz="22"></i></span><h2>'+esc(a.nome)+'</h2></div>'+
      '<button class="area-all" data-area="'+a.key+'">Marcar todas</button>'+
      '<div class="tasks">'+tasks+'</div>';
    root.appendChild(card);
  });
  root.querySelectorAll('.area-all').forEach(function(b){
    b.addEventListener('click', function(){
      const key=b.dataset.area;
      const boxes=root.querySelectorAll('input[data-area="'+key+'"]');
      const allOn=[].every.call(boxes, x=>x.checked);
      boxes.forEach(function(x){ x.checked=!allOn; });
      b.textContent = allOn ? 'Marcar todas' : 'Desmarcar todas';
    });
  });
}

function setPeriodo(key){
  document.querySelectorAll('#areas .area').forEach(function(c){ c.classList.toggle('hide', c.dataset.key!==key); });
  document.querySelectorAll('#periodoSeg button').forEach(function(b){ b.classList.toggle('active', b.dataset.p===key); });
}
document.getElementById('periodoSeg').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return; setPeriodo(b.dataset.p);
});

function coletar(){
  return AREAS.map(function(a){
    return { nome:a.nome, tarefas: a.tarefas.map(function(t,i){
      const c=document.querySelector('input[data-area="'+a.key+'"][data-i="'+i+'"]');
      return { t:t, ok: !!(c&&c.checked) };
    })};
  });
}

document.getElementById('btnSubmit').addEventListener('click', function(){
  const nome=document.getElementById('nome').value.trim();
  if(!nome){ alert('Seleciona o teu nome.'); document.getElementById('nome').focus(); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  const btn=this; btn.disabled=true; btn.textContent='A guardar\u2026';
  const payload={ nome:nome, obs:document.getElementById('obs').value.trim(), data:new Date().toISOString(), areas:coletar() };
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:'_checklist', autor:nome, texto:JSON.stringify(payload)})})
    .then(function(r){return r.json();})
    .then(function(j){
      if(j&&j.ok){
        document.querySelectorAll('#areas input[type=checkbox]').forEach(function(c){ c.checked=false; });
        document.querySelectorAll('.area-all').forEach(function(b){ b.textContent='Marcar todas'; });
        document.getElementById('obs').value='';
        document.getElementById('nome').value='';
        btn.disabled=false; btn.innerHTML='<i data-lu="check"></i> Confirmar checklist';
        mostrarToast('Checklist de '+nome+' registada');
        carregarHist();
      }else{ throw new Error('erro'); }
    })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel guardar. Tenta de novo.'); btn.disabled=false; btn.innerHTML='<i data-lu="check"></i> Confirmar checklist'; });
});

function imprimirDia(){
  var d=new Date();
  var data=('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
  var html='<div class="ph-head"><h1>Checklist do dia \u2014 Sport Zone Vasco da Gama</h1><div class="ph-date">Data: '+data+'</div></div>';
  AREAS.forEach(function(a){
    html+='<h2>'+esc(a.nome)+'</h2><ul class="ph-tasks">';
    a.tarefas.forEach(function(t){ html+='<li><span class="bx"></span><span>'+esc(t)+'</span></li>'; });
    html+='</ul>';
  });
  html+='<div class="ph-sign">Respons\u00E1vel: ________________________________<br>Assinatura: __________________________________</div>';
  document.getElementById('printArea').innerHTML=html;
  setTimeout(function(){ window.print(); },80);
}
document.getElementById('btnPrint').addEventListener('click', imprimirDia);

var _toastT=null;
function mostrarToast(msg){
  var t=document.getElementById('toast'); if(!t) return;
  t.textContent=msg; t.classList.add('show');
  if(_toastT) clearTimeout(_toastT);
  _toastT=setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

function fmtDataHora(iso){ var d=new Date(iso); if(isNaN(d)) return String(iso||''); return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
var HIST=[];
function carregarHist(){
  if(!BACKEND) return;
  fetch(BACKEND+'?action=notas&t='+Date.now()).then(function(r){return r.json();}).then(function(j){
    if(!j||!j.ok||!Array.isArray(j.notas)) return;
    HIST=j.notas.filter(function(n){return String(n.seccao)==='_checklist';})
      .map(function(n){ var p={}; try{ p=JSON.parse(n.texto||'{}'); }catch(e){} return {id:n.id, p:p, ts:p.data||n.data}; })
      .sort(function(a,b){ return new Date(b.ts)-new Date(a.ts); });
    renderHist();
  }).catch(function(){});
}
function renderHist(){
  var box=document.getElementById('hist'); if(!box) return;
  if(!HIST.length){ box.innerHTML='<div id="histEmpty">Ainda n\u00E3o h\u00E1 registos.</div>'; return; }
  box.innerHTML='';
  HIST.forEach(function(h){
    var p=h.p||{}; var areas=Array.isArray(p.areas)?p.areas:[];
    var resumo=areas.map(function(a){ var f=(a.tarefas||[]).filter(function(t){return t.ok;}).length; var tot=(a.tarefas||[]).length; return esc(a.nome)+' '+f+'/'+tot; }).join(' \u00B7 ');
    var row=document.createElement('div'); row.className='hrow';
    row.innerHTML='<div class="hinfo"><div class="hnome">'+esc(p.nome||'\u2014')+'</div><div class="hsub">'+esc(fmtDataHora(h.ts))+(resumo?' \u00B7 '+resumo:'')+(p.obs?' \u00B7 '+esc(p.obs):'')+'</div></div>';
    var del=document.createElement('button'); del.className='hdel'; del.textContent='\u2715'; del.title='Apagar registo'; del.onclick=function(){ apagarHist(h.id); };
    row.appendChild(del);
    box.appendChild(row);
  });
}
function apagarHist(id){
  if(!confirm('Apagar este registo?')) return;
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'nota_del', id:id})})
    .then(function(r){return r.json();}).then(function(){ HIST=HIST.filter(function(x){return String(x.id)!==String(id);}); renderHist(); })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel apagar.'); });
}

render();
carregarHist();
</script>
</body>
</html>
