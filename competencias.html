<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
    --l0:#f1eee9;--l1:#f87171;--l2:#fbbf24;--l3:#34d399;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:1100px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:16px;margin:0;font-weight:800;line-height:1.15;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .h-actions{display:flex;gap:8px;flex:none;align-items:center;}
  .saved{font-size:11px;color:#fff;opacity:.92;font-weight:700;display:flex;align-items:center;gap:5px;}
  .saved .dot{width:8px;height:8px;border-radius:50%;background:#bff7c6;}
  .saved.sync .dot{background:#fff0b3;} .saved.off .dot{background:#ffc4c4;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  main{max-width:1100px;margin:0 auto;padding:12px 12px 24px;}
  .intro{font-size:12.5px;color:var(--muted);margin:4px 2px 10px;}
  .intro b{color:var(--accent-ink);}

  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin:0 2px 12px;font-size:12px;align-items:center;}
  .legend .it{display:flex;align-items:center;gap:6px;}
  .legend .sw{width:16px;height:16px;border-radius:5px;border:1px solid rgba(0,0,0,.08);}
  .sw0{background:var(--l0);} .sw1{background:var(--l1);} .sw2{background:var(--l2);} .sw3{background:var(--l3);}

  .filtros{display:flex;flex-wrap:wrap;gap:7px;margin:0 2px 12px;}
  .chip{border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

  .wrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:var(--shadow);max-height:78vh;}
  table.mat{border-collapse:separate;border-spacing:0;font-size:12px;}
  table.mat th,table.mat td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);}
  table.mat thead th{position:sticky;top:0;z-index:3;background:#fff;height:128px;vertical-align:bottom;padding:6px 0 8px;}
  table.mat th.topic span{writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;font-size:11px;font-weight:700;color:var(--ink);display:inline-block;max-height:116px;overflow:hidden;}
  table.mat th.topic{width:34px;min-width:34px;text-align:center;}
  table.mat th.corner,table.mat td.name{position:sticky;left:0;z-index:2;background:#fff;text-align:left;}
  table.mat th.corner{z-index:4;min-width:148px;width:148px;vertical-align:bottom;padding:6px 10px 8px;font-weight:800;color:var(--accent-ink);font-size:12px;}
  table.mat td.name{min-width:148px;width:148px;padding:7px 10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:148px;}
  table.mat tr.area td{position:sticky;left:0;z-index:2;background:var(--accent-soft);color:var(--accent-ink);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.03em;padding:6px 10px;}
  table.mat td.cell{width:34px;min-width:34px;height:34px;text-align:center;cursor:pointer;background:var(--l0);}
  table.mat td.cell.l1{background:var(--l1);} table.mat td.cell.l2{background:var(--l2);} table.mat td.cell.l3{background:var(--l3);}
  table.mat td.cell:active{filter:brightness(.92);}

  .status{text-align:center;color:var(--muted);font-size:14px;padding:30px 16px;}

  /* resumo global (matriz global de competencias) */
  .resumo-wrap{margin:0 2px 12px;}
  .resumo-btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--accent);background:#fff;color:var(--accent-dark);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
  .resumo-btn i{width:16px;height:16px;}
  .resumo-panel{display:none;margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px;}
  .resumo-panel.open{display:block;}
  .resumo-panel h3{margin:0 0 4px;font-size:14px;color:var(--accent-ink);}
  .resumo-panel .rsub{font-size:12px;color:var(--muted);margin:0 0 12px;}
  .resumo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;}
  .rcard{border:1px solid var(--line);border-radius:10px;padding:10px 11px;background:#faf8f5;}
  .rcard .rt{font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.25;min-height:29px;}
  .rcard .rn{display:flex;align-items:baseline;gap:5px;margin-top:6px;}
  .rcard .rn b{font-size:22px;font-weight:800;color:var(--pos);line-height:1;}
  .rcard .rn span{font-size:11px;color:var(--muted);}
  .rcard .rbar{height:6px;border-radius:4px;background:var(--l0);margin-top:8px;overflow:hidden;}
  .rcard .rbar i{display:block;height:100%;background:var(--l3);border-radius:4px;}
  .rcard.gap{border-color:#f3c0c0;background:#fff6f6;}
  .rcard.gap .rn b{color:var(--neg);}
</style>
</head>

<header>

<script>
"use strict";
const BACKEND=(typeof window!=='undefined'&&window.BACKEND_URL?String(window.BACKEND_URL).trim():'');
const ROSTER_URL='https://script.google.com/macros/s/AKfycbxztRKM-1SdK2PYfVrBQgbelxyDb3FYFMDgG9sWzbWOw9cdJL26G37Ui0jT1ltXZsk9/exec';
const COMP='_comp';

const TOPICOS=[
  'CAIXA','ENTRADA PROCEDIMENTOS','SNEAKERS BALC\u00C3O','ARMAZ\u00C9M CAL\u00C7ADO','USO DO GPC',
  'PREPARA\u00C7\u00C3O ONLINE LS','PROCEDIMENTO PROVADORES','VENDAS POR METRO','SALES FORCE (CRIAR E CONSULTAR)',
  'REC. MOBSHOP CAMI\u00C3O','TRANSFER\u00CANCIAS','DPD','GARLAND','TIBCO'
];
const AREA_NOMES={calcado:'Cal\u00E7ado',caixa:'Caixa',textil:'T\u00EAxtil',logistica:'Log\u00EDstica',sup:'Dire\u00E7\u00E3o',estagios:'Est\u00E1gios',visual:'Visual'};

let ROSTER=[];      // [{id, nome}] achatado por ordem de area
let GROUPS=[];      // [{id, nome:areaNome, nomes:[...]}]
let M={};           // matriz: { "Nome": {ti: nivel} }
let filtro='todas';

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function set(id,t){var e=document.getElementById(id);if(e)e.textContent=t;}
function setStatus(kind,txt){var el=document.getElementById('saveStatus');if(!el)return;el.className='saved'+(kind==='sync'?' sync':kind==='off'?' off':'');el.querySelector('.saved-txt').textContent=txt;}

/* ---- carregar roster (Super Liga) + matriz (nosso backend) ---- */
function carregar(){
  setStatus('sync','A ligar\u2026');
  var pRoster=fetch(ROSTER_URL+'?action=getRoster&t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).catch(()=>null);
  var pComp=BACKEND?fetch(BACKEND+'?action=notas&t='+Date.now()).then(r=>r.json()).catch(()=>null):Promise.resolve(null);
  Promise.all([pRoster,pComp]).then(function(res){
    var roster=res[0], notas=res[1];
    if(!Array.isArray(roster)||!roster.length){ document.getElementById('board').innerHTML='<div class="status">N\u00E3o foi poss\u00EDvel obter os colaboradores da Super Liga. Recarrega.</div>'; setStatus('off','Sem liga\u00E7\u00E3o'); return; }
    GROUPS=roster.map(function(g){ return {id:g.id, nome:(AREA_NOMES[g.id]||(g.id.charAt(0).toUpperCase()+g.id.slice(1))), nomes:(g.nomes||[]).slice()}; });
    // matriz: usar a nota _comp mais recente; limpar as antigas
    if(notas&&notas.ok&&Array.isArray(notas.notas)){
      var comps=notas.notas.filter(function(n){return String(n.seccao)===COMP;}).sort(function(a,b){return new Date(b.data)-new Date(a.data);});
      if(comps.length){ try{ M=JSON.parse(comps[0].texto||'{}')||{}; }catch(e){ M={}; } }
      for(var i=1;i<comps.length;i++){ apagarNota(comps[i].id); } // limpeza de versoes antigas
    }
    // limpeza automatica: tirar do mapa quem ja nao consta no roster da Super Liga
    var validos={}; GROUPS.forEach(function(g){ g.nomes.forEach(function(n){ validos[n]=1; }); });
    var removeu=false;
    Object.keys(M).forEach(function(n){ if(!validos[n]){ delete M[n]; removeu=true; } });
    construirFiltros(); render();
    if(removeu){ guardar(); } else { setStatus('ok','Guardado'); }
  });
}
function apagarNota(id){ if(!BACKEND)return; fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'nota_del',id:id})}).catch(function(){}); }

function construirFiltros(){
  var f=document.getElementById('filtros'); f.innerHTML='';
  var todas=document.createElement('button'); todas.className='chip'+(filtro==='todas'?' on':''); todas.textContent='Todas'; todas.onclick=function(){filtro='todas';construirFiltros();render();}; f.appendChild(todas);
  GROUPS.forEach(function(g){ var b=document.createElement('button'); b.className='chip'+(filtro===g.id?' on':''); b.textContent=g.nome; b.onclick=function(){filtro=g.id;construirFiltros();render();}; f.appendChild(b); });
}

function render(){
  var board=document.getElementById('board');
  var grupos=GROUPS.filter(function(g){return filtro==='todas'||g.id===filtro;});
  if(!grupos.length){ board.innerHTML='<div class="status">Sem colaboradores.</div>'; return; }
  var html='<div class="wrap"><table class="mat"><thead><tr><th class="corner">Colaborador</th>';
  TOPICOS.forEach(function(tp){ html+='<th class="topic" title="'+esc(tp)+'"><span>'+esc(tp)+'</span></th>'; });
  html+='</tr></thead><tbody>';
  grupos.forEach(function(g){
    html+='<tr class="area"><td colspan="'+(TOPICOS.length+1)+'">'+esc(g.nome)+'</td></tr>';
    g.nomes.forEach(function(nome){
      html+='<tr><td class="name" title="'+esc(nome)+'">'+esc(nome)+'</td>';
      var row=M[nome]||{};
      for(var ti=0;ti<TOPICOS.length;ti++){
        var lvl=+row[ti]||0;
        html+='<td class="cell'+(lvl?' l'+lvl:'')+'" data-nome="'+esc(nome)+'" data-ti="'+ti+'"></td>';
      }
      html+='</tr>';
    });
  });
  html+='</tbody></table></div>';
  board.innerHTML=html;
  refreshResumo();
  board.querySelectorAll('td.cell').forEach(function(c){
    c.addEventListener('click',function(){
      var nome=c.dataset.nome, ti=c.dataset.ti;
      var cur=+( (M[nome]||{})[ti] )||0;
      var nx=(cur+1)%4;
      if(!M[nome]) M[nome]={};
      if(nx===0) delete M[nome][ti]; else M[nome][ti]=nx;
      c.className='cell'+(nx?' l'+nx:'');
      guardar();
    });
  });
}

/* ---- guardar matriz (nota _comp, sem mudar Apps Script) ---- */
var saveTimer;
function guardar(){
  if(!BACKEND){ setStatus('off','Sem liga\u00E7\u00E3o'); return; }
  setStatus('sync','A guardar\u2026');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'nota_add', seccao:COMP, autor:'mapa', texto:JSON.stringify(M)})})
      .then(r=>r.json()).then(function(j){ if(j&&j.ok) setStatus('ok','Guardado'); else throw 0; })
      .catch(function(){ setStatus('off','Sem liga\u00E7\u00E3o \u2014 tenta de novo'); });
  },1200);
}

/* ---- Matriz Global: quantos colaboradores dominam cada competencia (verde = nivel 3) ---- */
function refreshResumo(){
  var panel=document.getElementById('resumoPanel');
  if(panel&&panel.classList.contains('open')) renderResumo();
}
function renderResumo(){
  var panel=document.getElementById('resumoPanel'); if(!panel)return;
  var totalColab=0; GROUPS.forEach(function(g){ totalColab+=g.nomes.length; });
  // conta, por topico, quantos colaboradores estao a nivel 3 (Autonomo = quadrado verde)
  var counts=TOPICOS.map(function(_,ti){
    var c=0; Object.keys(M).forEach(function(nome){ if((+((M[nome]||{})[ti])||0)===3) c++; }); return c;
  });
  var limiteGap=Math.max(1,Math.round((totalColab||1)*0.25));
  var cards=TOPICOS.map(function(tp,ti){
    var n=counts[ti];
    var pct=totalColab?Math.round(n/totalColab*100):0;
    var gap=(n<=limiteGap);
    return '<div class="rcard'+(gap?' gap':'')+'">'
      +'<div class="rt">'+esc(tp)+'</div>'
      +'<div class="rn"><b>'+n+'</b><span>de '+totalColab+'</span></div>'
      +'<div class="rbar"><i style="width:'+Math.min(100,pct)+'%"></i></div></div>';
  }).join('');
  panel.innerHTML='<h3>Quantos colaboradores dominam cada compet\u00EAncia</h3>'
    +'<p class="rsub">Soma autom\u00E1tica dos quadrados verdes (n\u00EDvel <b>Aut\u00F3nomo</b>) de toda a loja \u2014 '+totalColab+' colaboradores. Ajuda a identificar lacunas e necessidades de forma\u00E7\u00E3o (a vermelho, as mais fr\u00E1geis).</p>'
    +'<div class="resumo-grid">'+cards+'</div>';
  if(window.lucideRepl) window.lucideRepl();
}
document.getElementById('btnResumo').addEventListener('click',function(){
  var p=document.getElementById('resumoPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')) renderResumo();
});

carregar();
</script>
