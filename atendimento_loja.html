<title>Atendimento Loja &#xB7; Sport Zone Vasco da Gama</title>
<script src="config.js"></script>
<script src="lucide.js"></script>
<script src="roster.js"></script>
<script>if(sessionStorage.getItem('portalOK')!=='1')location.replace('index.html');</script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:760px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .h-actions{display:flex;gap:8px;flex:none;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 24px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin:12px 0;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field textarea{min-height:90px;resize:vertical;}
  #feedback{min-height:150px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}

  .intro{font-size:13px;color:var(--muted);margin:2px 2px 0;}
  .sec-h{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-dark);font-weight:800;margin:18px 3px 2px;}

  .crit{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin:12px 0;}
  .crit-t{font-weight:700;font-size:14.5px;}
  .scale{font-size:11px;color:var(--muted);font-weight:700;margin:9px 0 6px;text-transform:uppercase;letter-spacing:.03em;}
  .score{display:flex;gap:7px;}
  .score button{flex:1;min-width:42px;height:48px;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--ink);font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;}
  .score button:active{transform:scale(.95);}
  .score button.sel{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(230,98,0,.3);}
  .score button.sel[data-v="1"]{background:#dc2626;border-color:#dc2626;color:#fff;}
  .score button.sel[data-v="2"]{background:#f5b301;border-color:#f5b301;color:#1a1303;}
  .score button.sel[data-v="3"]{background:#15803d;border-color:#15803d;color:#fff;}

  .total-card{background:#1a1303;color:#fff;border:none;}
  .total-card .trow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:4px 0;font-size:15px;font-weight:700;}
  .total-card .trow b{font-size:22px;font-weight:800;color:#ffb45e;}

  .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .btn{flex:1;min-width:150px;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
  .btn.save{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(230,98,0,.3);}
  .btn.print{background:#fff;border:2px solid var(--accent);color:var(--accent-dark);}
  .btn.reset{background:#fff;border:2px solid var(--line);color:var(--neg);}

  #histView{display:none;}
  body.av-hist main>.card,body.av-hist main>.crit,body.av-hist main>.actions,body.av-hist main>.intro,body.av-hist main>.sec-h,body.av-hist main>#criterios{display:none !important;}
  body.av-hist #histView{display:block;}
  .av-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-top:10px;background:#fff;}
  .av-info{flex:1;min-width:0;font-size:14px;}
  .av-info b{color:var(--accent-dark);}
  .av-sub{font-size:12px;color:var(--muted);margin-top:3px;}
  .av-acts{display:flex;flex-direction:column;gap:6px;flex:none;}
  .av-print{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
  .av-del{background:none;border:none;color:var(--neg);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

  /* Impressao em PDF */
  #printArea{display:none;}
  @media print{
    @page{size:A4;margin:15mm 14mm;}
    header,main>.card,main>.crit,main>.actions,main>.intro,main>.sec-h,main>#criterios,#histView{display:none !important;}
    #printArea{display:block !important;color:#000;}
    #printArea h1{font-size:22px;margin:0;}
    #printArea .psub{font-size:13px;color:#555;margin:2px 0 14px;border-bottom:2px solid #FF8100;padding-bottom:8px;}
    #printArea .who{width:100%;border-collapse:collapse;margin-bottom:14px;}
    #printArea .who td{padding:5px 4px;font-size:14px;}
    #printArea .who td.k{color:#555;width:150px;}
    #printArea .who td.v{font-weight:800;}
    #printArea h2{font-size:12.5px;margin:16px 0 4px;color:#8a4500;text-transform:uppercase;letter-spacing:.04em;}
    #printArea table.res{width:100%;border-collapse:collapse;}
    #printArea .res td{padding:7px 6px;border-bottom:1px solid #e6e6e6;font-size:13px;vertical-align:top;}
    #printArea .res td.n{text-align:right;font-weight:800;font-size:16px;width:80px;white-space:nowrap;}
    #printArea .res tr.tot td{border-top:2px solid #FF8100;border-bottom:none;font-size:15px;font-weight:800;padding-top:10px;}
    #printArea .res tr.tot td.n{font-size:19px;color:#E06E00;}
    #printArea .fb{margin-top:14px;font-size:13px;}

  {t:'Abordar', perguntas:[
    {k:'ab1', n:'Cumprimentou todos os clientes de forma am\u00E1vel e cordial? Sorriu e esteve atento/a?'},
    {k:'ab2', n:'Esteve atento/a aos sinais de compra do cliente? A abordagem ao cliente foi correta?'}
  ]},
  {t:'Perguntar', perguntas:[
    {k:'pg1', n:'Fez 2 a 3 perguntas abertas no m\u00EDnimo para perceber as necessidades do cliente?'},
    {k:'pg2', n:'Demonstrou aten\u00E7\u00E3o ao cliente e usou a escuta ativa?'}
  ]},
  {t:'Aconselhar', perguntas:[
    {k:'ac1', n:'Ofereceu informa\u00E7\u00E3o sobre o produto? (utilidades, benef\u00EDcios, exclusividade, novidades, tend\u00EAncia, etc.)'},
    {k:'ac2', n:'Acompanhou o cliente at\u00E9 ao produto que procurava?'},
    {k:'ac3', n:'Se o produto n\u00E3o est\u00E1 dispon\u00EDvel, ofereceu uma alternativa ou venda multicanal?'},
    {k:'ac4', n:'Convidou o cliente a tocar e a experimentar o produto? (T\u00EAxtil: acompanhou aos provadores e fez o procedimento; Cal\u00E7ado: pediu para se sentar e colocou o artigo \u00E0 disposi\u00E7\u00E3o)'}
  ]},
  {t:'Cross Selling', perguntas:[
    {k:'cs1', n:'Ofereceu venda complementar / sugeriu campanhas de acordo com a compra do cliente?'}
  ]},
  {t:'Fidelizar', perguntas:[
    {k:'fi1', n:'Fechou a venda perguntando se podia ajudar em algo mais? Agradeceu ao cliente pela compra?'}
  ]}
];
const PMAX=3;
var NQ=0; SECCOES.forEach(function(s){ NQ+=s.perguntas.length; });
const TOTAL_MAX=NQ*PMAX;

function today(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function defaults(){ return {colaborador:'', avaliador:'', data:today(), scores:{}, feedback:''}; }
let st;
try{ st=Object.assign(defaults(), JSON.parse(localStorage.getItem(KEY))||{}); if(!st.scores) st.scores={}; }catch(e){ st=defaults(); }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(st)); }catch(e){} }

function botoes(k,val){
  var h='';
  for(var i=1;i<=PMAX;i++){ h+='<button type="button" data-k="'+k+'" data-v="'+i+'"'+(val===i?' class="sel"':'')+'>'+i+'</button>'; }
  return h;
}
function construir(){
  var box=document.getElementById('criterios'); var h='';
  SECCOES.forEach(function(sec){
    h+='<div class="sec-h">'+esc(sec.t)+'</div>';
    sec.perguntas.forEach(function(p){
      h+='<div class="crit">'
        +'<div class="crit-t">'+esc(p.n)+'</div>'
        +'<div class="scale">Pontua\u00E7\u00E3o 1 a 3</div>'
        +'<div class="score">'+botoes(p.k,(p.k in st.scores)?st.scores[p.k]:null)+'</div>'
        +'</div>';
    });
  });
  box.innerHTML=h;
  box.querySelectorAll('.score button').forEach(function(b){
    b.addEventListener('click',function(){
      var k=b.dataset.k, v=parseInt(b.dataset.v,10);
      if(st.scores[k]===v) delete st.scores[k]; else st.scores[k]=v;
      var row=b.parentNode; row.querySelectorAll('button').forEach(function(x){ x.classList.remove('sel'); });
      if(st.scores[k]!=null){ var sel=row.querySelector('button[data-v="'+st.scores[k]+'"]'); if(sel) sel.classList.add('sel'); }
      save(); totais();
    });
  });
}
function somaTotal(d){ var s=0; SECCOES.forEach(function(sec){ sec.perguntas.forEach(function(p){ if(d.scores&&(p.k in d.scores)) s+=d.scores[p.k]; }); }); return s; }
function totais(){ document.getElementById('tTot').textContent=somaTotal(st)+' / '+TOTAL_MAX; }

function pinta(){
  document.getElementById('colaborador').value=st.colaborador||'';
  document.getElementById('avaliador').value=st.avaliador||'';
  document.getElementById('data').value=st.data||today();
  document.getElementById('feedback').value=st.feedback||'';
}
document.getElementById('colaborador').addEventListener('change',function(){ st.colaborador=this.value; save(); });
document.getElementById('avaliador').addEventListener('change',function(){ st.avaliador=this.value; save(); });
document.getElementById('data').addEventListener('change',function(){ st.data=this.value; save(); });
document.getElementById('feedback').addEventListener('input',function(){ st.feedback=this.value; save(); });

/* ---------- imprimir ---------- */
function montarPrint(d){
  var dd=new Date((d.data||'')+'T00:00:00'); var ds=isNaN(dd)?(d.data||''):dd.toLocaleDateString('pt-PT');
  var body='';
  SECCOES.forEach(function(sec){
    body+='<tr><td colspan="2"><h2 style="margin:10px 0 2px;">'+esc(sec.t)+'</h2></td></tr>';
    sec.perguntas.forEach(function(p){
      var v=(d.scores&&(p.k in d.scores))?d.scores[p.k]:null;
      body+='<tr><td>'+esc(p.n)+'</td><td class="n">'+(v==null?'\u2014':v)+' / '+PMAX+'</td></tr>';
    });
  });
  body+='<tr class="tot"><td>Pontua\u00E7\u00E3o total</td><td class="n">'+somaTotal(d)+' / '+TOTAL_MAX+'</td></tr>';
  var html='<h1>Atendimento em Loja \u2014 Sport Zone Vasco da Gama</h1>'
    +'<div class="psub">Loja Vasco da Gama</div>'
    +'<table class="who"><tbody>'
    +'<tr><td class="k">Colaborador</td><td class="v">'+esc(d.colaborador||'\u2014')+'</td></tr>'
    +'<tr><td class="k">Supervis\u00E3o</td><td class="v">'+esc(d.avaliador||'\u2014')+'</td></tr>'
    +'<tr><td class="k">Data</td><td class="v">'+esc(ds)+'</td></tr>'
    +'</tbody></table>'
    +'<table class="res"><tbody>'+body+'</tbody></table>';
  if(d.feedback){ html+='<div class="fb"><div class="lbl">Feedback e plano de a\u00E7\u00E3o</div><div class="box">'+esc(d.feedback)+'</div></div>'; }
  document.getElementById('printArea').innerHTML=html;
}
function imprimir(){ montarPrint(st); setTimeout(function(){ window.print(); },120); }
document.getElementById('btnPrint').addEventListener('click',imprimir);
document.getElementById('btnPrintTop').addEventListener('click',imprimir);

/* ---------- guardar na nuvem ---------- */
document.getElementById('btnSave').addEventListener('click',function(){
  if(!st.colaborador){ alert('Escolhe o colaborador.'); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  var payload={colaborador:st.colaborador, avaliador:st.avaliador, data:st.data, scores:st.scores, feedback:st.feedback, total:somaTotal(st)};
  var btn=this, old=btn.textContent; btn.disabled=true; btn.textContent='A guardar\u2026';
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:SEC, autor:st.colaborador+'|'+st.data, texto:JSON.stringify(payload)})})
    .then(function(r){return r.json();}).then(function(j){
      if(j&&j.ok){ btn.textContent='\u2713 Guardada'; setTimeout(function(){ btn.textContent=old; btn.disabled=false; },1600); }
      else throw 0;
    })
    .catch(function(){ btn.disabled=false; btn.textContent=old; alert('N\u00E3o foi poss\u00EDvel guardar. Tenta de novo.'); });
});

/* ---------- nova avaliacao ---------- */
document.getElementById('btnReset').addEventListener('click',function(){
  if(!confirm('Come\u00E7ar uma nova avalia\u00E7\u00E3o? Os dados n\u00E3o guardados ser\u00E3o apagados.')) return;
  st=defaults(); save(); pinta(); construir(); totais();
});

/* ---------- historico ---------- */
let AV=[];
function abrirHist(){
  document.body.classList.add('av-hist');
  var l=document.getElementById('av-list');
  if(!BACKEND){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem liga\u00E7\u00E3o \u00E0 nuvem.</p>'; return; }
  l.innerHTML='<p style="color:var(--muted);font-size:13px;">A carregar\u2026</p>';
  fetch(BACKEND+'?action=notas&t='+Date.now())
    .then(function(r){return r.json();}).then(function(j){
      if(j&&j.ok&&Array.isArray(j.notas)){
        AV=j.notas.filter(function(n){return String(n.seccao)===SEC;})
          .map(function(n){ var d={}; try{ d=JSON.parse(n.texto||'{}'); }catch(e){} return {id:n.id, d:d, ts:n.data}; })
          .sort(function(a,b){ return new Date(b.ts)-new Date(a.ts); });
        renderHist();
      } else { l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem dados.</p>'; }
    }).catch(function(){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem liga\u00E7\u00E3o. Recarrega.</p>'; });
}
function renderHist(){
  var l=document.getElementById('av-list'); l.innerHTML='';
  if(!AV.length){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Ainda n\u00E3o h\u00E1 avalia\u00E7\u00F5es guardadas.</p>'; return; }
  AV.forEach(function(h){
    var d=h.d||{};
    var dd=new Date((d.data||'')+'T00:00:00'); var ds=isNaN(dd)?(d.data||''):dd.toLocaleDateString('pt-PT');
    var row=document.createElement('div'); row.className='av-row';
    row.innerHTML='<div class="av-info"><b>'+esc(d.colaborador||'\u2014')+'</b>'
      +'<div class="av-sub">'+esc(ds)+(d.avaliador?' \u00B7 por '+esc(d.avaliador):'')
      +' \u00B7 '+(d.total==null?0:d.total)+'/'+TOTAL_MAX+'</div></div>';
    var acts=document.createElement('div'); acts.className='av-acts';
    var bp=document.createElement('button'); bp.className='av-print'; bp.textContent='\uD83D\uDDA8\uFE0F Imprimir'; bp.onclick=function(){ montarPrint(d); setTimeout(function(){ window.print(); },120); };
    var bd=document.createElement('button'); bd.className='av-del'; bd.textContent='\u2715 Apagar'; bd.onclick=function(){ apagarHist(h.id); };
    acts.appendChild(bp); acts.appendChild(bd); row.appendChild(acts);
    l.appendChild(row);
  });
}
function apagarHist(id){
  if(!confirm('Apagar esta avalia\u00E7\u00E3o?')) return;
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_del', id:id})})
    .then(function(r){return r.json();}).then(function(){ AV=AV.filter(function(x){return String(x.id)!==String(id);}); renderHist(); })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel apagar.'); });
}
document.getElementById('btnHistView').addEventListener('click',abrirHist);
document.getElementById('histBack').addEventListener('click',function(){ document.body.classList.remove('av-hist'); });

/* ---------- arranque ---------- */
pinta(); construir(); totais();
</script>
</body>
</html>
