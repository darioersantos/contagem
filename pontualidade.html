<script src="config.js"></script>
<script src="lucide.js"></script>
<script src="roster.js"></script>
<script>if(sessionStorage.getItem('portalOK')!=='1')location.replace('index.html');</script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:880px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 24px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin:12px 0;}
  .card h2{font-size:15px;margin:0 0 12px;font-weight:800;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field select{width:100%;max-width:100%;min-width:0;box-sizing:border-box;-webkit-appearance:none;appearance:none;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field input[type=date]{display:block;height:48px;line-height:1.2;-webkit-appearance:none;appearance:none;}
  .field input[type=date]::-webkit-date-and-time-value{text-align:left;}
  .field input[type=date]::-webkit-calendar-picker-indicator{margin-left:auto;}
  .field input:focus{outline:none;border-color:var(--accent);}
  .row2{display:flex;gap:10px;flex-wrap:wrap;}
  .row2 .field{flex:1;min-width:140px;}
  .save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(230,98,0,.3);}
  .field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);min-height:70px;resize:vertical;}
  .field textarea:focus{outline:none;border-color:var(--accent);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chips button{border:2px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .chips button:active{transform:scale(.96);}
  .chips button.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
  .lim-row{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;margin-top:10px;background:#fff;}
  .lim-row .info{flex:1;min-width:0;}
  .lim-row .nome{font-weight:800;color:var(--accent-dark);}
  .lim-row .det{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4;}
  .lim-row .del{background:none;border:none;color:var(--neg);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:none;}
  .save:disabled{opacity:.6;}

  .aniv{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--line);}
  .aniv:last-child{border-bottom:none;}
  .aniv .cake{font-size:22px;}
  .aniv .info{flex:1;min-width:0;}
  .aniv .nome{font-size:15px;font-weight:700;}
  .aniv .data{font-size:13px;color:var(--muted);}
  .aniv.hoje{background:#fff7ed;border-radius:10px;}
  .aniv .hojetag{background:var(--accent);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:2px 8px;text-transform:uppercase;}
  .aniv .del{background:none;border:none;color:var(--neg);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
  .mes{font-size:12px;font-weight:800;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.04em;margin:14px 2px 2px;}
  .status{text-align:center;color:var(--muted);font-size:13px;padding:16px;}
  .aviso{display:flex;align-items:flex-start;gap:10px;padding:13px;border:1px solid var(--line);border-radius:12px;margin-top:10px;background:#fff;}
  .aviso .info{flex:1;min-width:0;}
  .aviso .av-t{font-weight:800;color:var(--accent-dark);}
  .aviso .av-d{font-size:13.5px;color:var(--ink);margin-top:4px;white-space:pre-wrap;word-break:break-word;line-height:1.5;}
  .aviso .av-m{font-size:12px;color:var(--muted);margin-top:6px;}
  .aviso .del{background:none;border:none;color:var(--neg);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:none;padding:2px 4px;}
  .seg{display:flex;gap:8px;flex-wrap:wrap;}
  .seg button{flex:1;min-width:90px;border:2px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
  .seg button.sel.tipo-pont{background:var(--pos);border-color:transparent;color:#fff;}
  .seg button.sel.tipo-atraso{background:#d97706;border-color:transparent;color:#fff;}
  .seg button.sel.tipo-abs{background:var(--neg);border-color:transparent;color:#fff;}
  .pill{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;color:#fff;vertical-align:1px;}
  .pill.tipo-pont{background:var(--pos);} .pill.tipo-atraso{background:#d97706;} .pill.tipo-abs{background:var(--neg);}
  .selnames{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
  .selnames .chip{background:var(--accent-soft);color:var(--accent-ink);border-radius:999px;padding:5px 11px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:7px;}
  .selnames .chip b{cursor:pointer;color:var(--neg);font-size:14px;}
</style>
</head>

<header>

<script>
"use strict";
const BACKEND=(typeof window!=='undefined'&&window.BACKEND_URL?String(window.BACKEND_URL).trim():'');
const SEC='_pontual';
let DADOS=[];
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtDataHora(iso){ var d=new Date(iso); if(isNaN(d)) return String(iso||''); return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
function fmtData(s){ var d=new Date((s||'')+'T00:00:00'); if(isNaN(d)){ d=new Date(s); } return isNaN(d)?String(s||''):d.toLocaleDateString('pt-PT'); }
function today(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function clsTipo(t){ return t==='Atraso'?'tipo-atraso':(t==='Pontualidade'?'tipo-pont':'tipo-abs'); }
var selNames=[], tipoSel='';
function pintaSel(){ var box=document.getElementById('selNames'); box.innerHTML=''; selNames.forEach(function(nm){ var c=document.createElement('span'); c.className='chip'; c.innerHTML=esc(nm)+' <b>\u00D7</b>'; c.querySelector('b').onclick=function(){ selNames=selNames.filter(function(x){return x!==nm;}); pintaSel(); }; box.appendChild(c); }); }
document.getElementById('colab').addEventListener('change',function(){ var v=this.value; if(v && selNames.indexOf(v)<0){ selNames.push(v); pintaSel(); } this.value=''; });
document.getElementById('tipoSeg').addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b) return; tipoSel=b.dataset.t; document.querySelectorAll('#tipoSeg button').forEach(function(x){ x.classList.toggle('sel', x===b); }); });
var _d=document.getElementById('data'); if(_d) _d.value=today();
function render(){
  const l=document.getElementById('lista'); l.innerHTML='';
  if(!DADOS.length){ l.innerHTML='<div class="status">Ainda n\u00E3o h\u00E1 registos.</div>'; return; }
  DADOS.map(function(n){ var d={}; try{d=JSON.parse(n.texto||'{}');}catch(e){} return {id:n.id, colab:n.autor, tipo:d.tipo||'', data:d.data||'', obs:d.obs||'', por:d.por||'', ts:d.data||n.data}; })
    .sort(function(a,b){ return new Date(b.ts)-new Date(a.ts); })
    .forEach(function(o){
      var row=document.createElement('div'); row.className='aviso';
      row.innerHTML='<div class="info"><div class="av-t">'+esc(o.colab||'\u2014')+' <span class="pill '+clsTipo(o.tipo)+'">'+esc(o.tipo||'')+'</span></div><div class="av-m">'+esc(fmtData(o.data))+(o.obs?' \u00B7 '+esc(o.obs):'')+(o.por?' \u00B7 por '+esc(o.por):'')+'</div></div><button class="del"><i data-lu="x" data-sz="14"></i></button>';
      row.querySelector('.del').onclick=function(){ apagar(o.id); };
      l.appendChild(row);
    });
}
function carregar(){
  if(!BACKEND){ document.getElementById('lista').innerHTML='<div class="status">Sem liga\u00E7\u00E3o \u00E0 nuvem.</div>'; return; }
  fetch(BACKEND+'?action=notas&t='+Date.now()).then(r=>r.json()).then(function(j){
    if(j&&j.ok&&Array.isArray(j.notas)){ DADOS=j.notas.filter(n=>String(n.seccao)===SEC); render(); }
    else{ document.getElementById('lista').innerHTML='<div class="status">A nuvem ainda n\u00E3o est\u00E1 ativa.</div>'; }
  }).catch(function(){ document.getElementById('lista').innerHTML='<div class="status">Sem liga\u00E7\u00E3o. Recarrega.</div>'; });
}
document.getElementById('btnSave').addEventListener('click',function(){
  var data=document.getElementById('data').value||today();
  var obs=document.getElementById('obs').value.trim();
  var autor=document.getElementById('autor').value.trim();
  if(!selNames.length){ alert('Escolhe pelo menos um colaborador.'); return; }
  if(!tipoSel){ alert('Escolhe o tipo (atraso ou falta).'); return; }
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  const btn=this; btn.disabled=true; btn.textContent='A guardar\u2026';
  var reqs=selNames.map(function(nome){ return fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:SEC, autor:nome, texto:JSON.stringify({data:data,tipo:tipoSel,obs:obs,por:autor})})}).then(function(r){return r.json();}); });
  Promise.all(reqs).then(function(res){
    if(res.every(function(j){return j&&j.ok;})){ selNames=[]; pintaSel(); tipoSel=''; document.querySelectorAll('#tipoSeg button').forEach(function(x){x.classList.remove('sel');}); document.getElementById('obs').value=''; var a=document.getElementById('autor'); if(a) a.value=''; document.getElementById('data').value=today(); carregar(); }
    else throw new Error('erro');
  }).catch(function(){ alert('N\u00E3o foi poss\u00EDvel guardar. Tenta de novo.'); })
  .then(function(){ btn.disabled=false; btn.textContent='Guardar registo'; });
});
function apagar(id){
  if(!confirm('Apagar este registo?')) return;
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'nota_del', id:id})})
    .then(r=>r.json()).then(function(){ DADOS=DADOS.filter(x=>String(x.id)!==String(id)); render(); })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel apagar.'); });
}
carregar();
</script>
