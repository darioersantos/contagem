<title>Happy Hour &#xB7; Sport Zone Vasco da Gama</title>
<script src="config.js"></script>
<script src="lucide.js"></script>
<script src="roster.js"></script>
<script>if(sessionStorage.getItem('portalOK')!=='1')location.replace('index.html');</script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--pos:#15803d;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:760px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:17px;margin:0;font-weight:800;line-height:1.1;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .h-actions{display:flex;gap:8px;flex:none;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 24px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin:12px 0;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field input:focus{outline:none;border-color:var(--accent);}

  .metric{display:flex;align-items:center;gap:12px;}
  .metric .m-lbl{flex:1;min-width:0;font-size:16px;font-weight:800;display:flex;align-items:center;gap:9px;}
  .metric .m-lbl .ic{font-size:22px;}
  .stepper{display:flex;align-items:center;gap:12px;flex:none;}
  .stepper button{width:48px;height:48px;border-radius:14px;border:none;font-size:26px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;line-height:1;}
  .stepper .minus{background:#fff;border:2px solid var(--line);color:var(--neg);}
  .stepper .plus{background:var(--accent);color:#fff;}
  .stepper button:active{transform:scale(.94);}
  .stepper .val{min-width:54px;text-align:center;font-size:28px;font-weight:800;}

  .valor-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .valor-top .m-lbl{font-size:16px;font-weight:800;display:flex;align-items:center;gap:9px;}
  .valor-top .m-lbl .ic{font-size:22px;}
  .valor-total{font-size:30px;font-weight:800;color:var(--accent-dark);}
  .valor-row{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .valor-row input{flex:1;min-width:0;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:17px;font-family:inherit;background:#fff;text-align:center;}
  .valor-row input:focus{outline:none;border-color:var(--accent);}
  .valor-row button{width:52px;height:52px;border-radius:14px;border:none;font-size:26px;font-weight:800;cursor:pointer;font-family:inherit;flex:none;}
  .valor-row .minus{background:#fff;border:2px solid var(--line);color:var(--neg);}
  .valor-row .plus{background:var(--accent);color:#fff;}
  .valor-row button:active{transform:scale(.94);}

  .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .btn{flex:1;min-width:150px;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
  .btn.print{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(230,98,0,.3);}
  .btn.reset{background:#fff;border:2px solid var(--line);color:var(--neg);}
  .btn.arq{background:#fff;border:2px solid var(--accent);color:var(--accent-dark);}
  #histView{display:none;}
  body.hh-hist main>.card,body.hh-hist main>.actions{display:none !important;}
  body.hh-hist #histView{display:block;}
  .hh-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-top:10px;background:#fff;}
  .hh-info{flex:1;min-width:0;font-size:14px;}
  .hh-info b{color:var(--accent-dark);}
  .hh-sub{font-size:12px;color:var(--muted);margin-top:3px;}
  .hh-acts{display:flex;flex-direction:column;gap:6px;flex:none;}
  .hh-print{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
  .hh-del{background:none;border:none;color:var(--neg);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

  /* Impressao em PDF */
  #printArea{display:none;}
  @media print{
    @page{size:A4;margin:16mm 14mm;}
    header,main>.card,main>.actions,#splash{display:none !important;}
    #printArea{display:block !important;color:#000;}
    #printArea h1{font-size:24px;margin:0;}
    #printArea .psub{font-size:13px;color:#555;margin:2px 0 16px;border-bottom:2px solid #FF8100;padding-bottom:8px;}
    #printArea table{width:100%;border-collapse:collapse;}
    #printArea .who td{padding:6px 4px;font-size:14px;}
    #printArea .who td.k{color:#555;width:170px;}
    #printArea .who td.v{font-weight:800;}
    #printArea h2{font-size:14px;margin:20px 0 6px;color:#8a4500;text-transform:uppercase;letter-spacing:.04em;}
    #printArea .res td{padding:9px 6px;border-bottom:1px solid #e6e6e6;font-size:15px;}
    #printArea .res td.n{text-align:right;font-weight:800;font-size:18px;width:130px;}
    #printArea .res tr.tot td{border-top:2px solid #FF8100;border-bottom:none;font-size:17px;padding-top:12px;}
    #printArea .res tr.tot td.n{font-size:22px;color:#E06E00;}
  }
</style>
</head>

<header>

    <button class="btn reset" id="histBack" type="button" style="width:auto;margin-bottom:12px;">&#x2190; Voltar</button>
    <div class="card" style="padding:16px;">
      <div style="font-weight:800;font-size:16px;"><i data-lu="history"></i> Hist&#xF3;rico de Happy Hour</div>
      <p style="margin:6px 0 0;color:var(--muted);font-size:13px;">Sess&#xF5;es guardadas. Toca em Imprimir para reimprimir.</p>
      <div id="hh-list"></div>
    </div>
  </div>
</main>

<div id="printArea"></div>

<script>
"use strict";
const KEY='happyhour_v1';
function today(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function euro(n){ return (Number(n)||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}); }
function num(v){ var n=parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const BACKEND=(typeof window!=='undefined'&&window.BACKEND_URL?String(window.BACKEND_URL).trim():'');

/* som + vibracao ao clicar nos +/- (mobile) */
var _actx;
function feedbackClick(){
  try{ if(navigator.vibrate) navigator.vibrate(15); }catch(e){}
  try{
    _actx=_actx||new (window.AudioContext||window.webkitAudioContext)();
    if(_actx.state==='suspended') _actx.resume();
    var o=_actx.createOscillator(), g=_actx.createGain();
    o.type='square'; o.frequency.value=640;
    g.gain.setValueAtTime(0.0001,_actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.16,_actx.currentTime+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,_actx.currentTime+0.08);
    o.connect(g); g.connect(_actx.destination);
    o.start(); o.stop(_actx.currentTime+0.09);
  }catch(e){}
}

function defaults(){ return {vendedor:'', avaliador:'', data:today(), online:0, sprays:0, atend:0, szclub:0, valor:0}; }
let st;
try{ st=Object.assign(defaults(), JSON.parse(localStorage.getItem(KEY))||{}); }catch(e){ st=defaults(); }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(st)); }catch(e){} }

function pinta(){
  document.getElementById('vendedor').value=st.vendedor||'';
  document.getElementById('avaliador').value=st.avaliador||'';
  document.getElementById('data').value=st.data||today();
  ['online','sprays','atend','szclub'].forEach(function(k){ document.getElementById('v-'+k).textContent=st[k]||0; });
  document.getElementById('v-valor').textContent=euro(st.valor||0);
}

document.getElementById('vendedor').addEventListener('input',function(){ st.vendedor=this.value; save(); });
document.getElementById('avaliador').addEventListener('input',function(){ st.avaliador=this.value; save(); });
document.getElementById('data').addEventListener('change',function(){ st.data=this.value; save(); });

document.querySelectorAll('.stepper button').forEach(function(b){
  b.addEventListener('click',function(){
    feedbackClick();
    var k=b.dataset.k, d=parseInt(b.dataset.d,10);
    st[k]=Math.max(0,(st[k]||0)+d);
    document.getElementById('v-'+k).textContent=st[k];
    save();
  });
});

function addValor(sign){
  var a=num(document.getElementById('valAmount').value);
  if(!a){ document.getElementById('valAmount').focus(); return; }
  feedbackClick();
  st.valor=Math.max(0, Math.round(((st.valor||0)+sign*a)*100)/100);
  document.getElementById('v-valor').textContent=euro(st.valor);
  document.getElementById('valAmount').value='';
  save();
}
document.getElementById('valPlus').addEventListener('click',function(){ addValor(1); });
document.getElementById('valMinus').addEventListener('click',function(){ addValor(-1); });

document.getElementById('btnReset').addEventListener('click',function(){
  if(!confirm('Come\u00E7ar uma nova Happy Hour? Os valores atuais ser\u00E3o limpos.')) return;
  st=defaults(); save(); pinta();
});

function imprimirObj(o){
  var d=new Date((o.data||today())+'T00:00:00'); var ds=isNaN(d)?(o.data||''):d.toLocaleDateString('pt-PT');
  var html='<h1>Happy Hour</h1><div class="psub">Sport Zone &middot; Vasco da Gama</div>';
  html+='<table class="who"><tbody>'+
    '<tr><td class="k">Vendedor</td><td class="v">'+esc(o.vendedor||'\u2014')+'</td></tr>'+
    '<tr><td class="k">Avaliado por</td><td class="v">'+esc(o.avaliador||'\u2014')+'</td></tr>'+
    '<tr><td class="k">Data</td><td class="v">'+esc(ds)+'</td></tr>'+
    '</tbody></table>';
  html+='<h2>Resultados</h2><table class="res"><tbody>'+
    '<tr><td>\uD83E\uDD1D Atendimentos</td><td class="n">'+(o.atend||0)+'</td></tr>'+
    '<tr><td>\uD83C\uDF10 Online</td><td class="n">'+(o.online||0)+'</td></tr>'+
    '<tr><td>\uD83E\uDDF4 Sprays</td><td class="n">'+(o.sprays||0)+'</td></tr>'+
    '<tr><td>\uD83C\uDF9F\uFE0F SZ Club</td><td class="n">'+(o.szclub||0)+'</td></tr>'+
    '<tr class="tot"><td>\uD83D\uDCB6 Valor das vendas</td><td class="n">'+euro(o.valor||0)+'</td></tr>'+
    '</tbody></table>';
  document.getElementById('printArea').innerHTML=html;
  setTimeout(function(){ window.print(); },120);
}
function imprimir(){ imprimirObj(st); }
document.getElementById('btnPrint').addEventListener('click',imprimir);
document.getElementById('btnPrint2').addEventListener('click',imprimir);

/* ---- Historico de Happy Hour (guardado como nota seccao=_hhhist; sem mudar Apps Script) ---- */
let HH=[];
document.getElementById('btnArquivar').addEventListener('click',function(){
  if(!BACKEND){ alert('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  if(!st.vendedor){ alert('Escreve o nome do vendedor antes de guardar.'); document.getElementById('vendedor').focus(); return; }
  var btn=this, old=btn.textContent; btn.disabled=true; btn.textContent='A guardar\u2026';
  var detalhe=JSON.stringify({vendedor:st.vendedor,avaliador:st.avaliador,data:st.data,online:st.online,sprays:st.sprays,atend:st.atend,szclub:st.szclub,valor:st.valor});
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:'_hhhist', autor:(st.vendedor||'')+'|'+(st.data||''), texto:detalhe})})
    .then(r=>r.json()).then(function(j){ if(j&&j.ok){ btn.textContent='\u2713 Guardado no hist\u00F3rico'; setTimeout(function(){btn.textContent=old;btn.disabled=false;},1600); } else throw 0; })
    .catch(function(){ btn.disabled=false; btn.textContent=old; alert('N\u00E3o foi poss\u00EDvel guardar. Tenta de novo.'); });
});
function carregarHH(){
  var l=document.getElementById('hh-list');
  if(!BACKEND){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem liga\u00E7\u00E3o \u00E0 nuvem.</p>'; return; }
  l.innerHTML='<p style="color:var(--muted);font-size:13px;">A carregar\u2026</p>';
  fetch(BACKEND+'?action=notas&t='+Date.now())
    .then(r=>r.json()).then(function(j){
      if(j&&j.ok&&Array.isArray(j.notas)){
        HH=j.notas.filter(function(n){return String(n.seccao)==='_hhhist';})
          .map(function(n){ var o={}; try{o=JSON.parse(n.texto||'{}');}catch(e){} o.id=n.id; o.ts=n.data; return o; })
          .sort(function(a,b){ return new Date(b.ts)-new Date(a.ts); });
        renderHH();
      } else { l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem dados.</p>'; }
    }).catch(function(){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Sem liga\u00E7\u00E3o. Recarrega.</p>'; });
}
function renderHH(){
  var l=document.getElementById('hh-list'); l.innerHTML='';
  if(!HH.length){ l.innerHTML='<p style="color:var(--muted);font-size:13px;">Ainda n\u00E3o h\u00E1 happy hours guardadas.</p>'; return; }
  HH.forEach(function(o){
    var d=new Date((o.data||'')+'T00:00:00'); var ds=isNaN(d)?(o.data||''):d.toLocaleDateString('pt-PT');
    var row=document.createElement('div'); row.className='hh-row';
    row.innerHTML='<div class="hh-info"><b>'+esc(o.vendedor||'\u2014')+'</b> \u00B7 '+esc(ds)+'<div class="hh-sub">\uD83E\uDD1D '+(o.atend||0)+' \u00B7 \uD83C\uDF10 '+(o.online||0)+' \u00B7 \uD83E\uDDF4 '+(o.sprays||0)+' \u00B7 \uD83C\uDF9F\uFE0F '+(o.szclub||0)+' \u00B7 '+euro(o.valor||0)+'</div></div>'+
      '<div class="hh-acts"><button class="hh-print">\uD83D\uDDA8\uFE0F Imprimir</button><button class="hh-del">\u2715 Apagar</button></div>';
    row.querySelector('.hh-print').onclick=function(){ imprimirObj(o); };
    row.querySelector('.hh-del').onclick=function(){ apagarHH(o.id); };
    l.appendChild(row);
  });
}
function apagarHH(id){
  if(!confirm('Apagar esta happy hour do hist\u00F3rico?')) return;
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_del', id:id})})
    .then(r=>r.json()).then(function(){ HH=HH.filter(x=>String(x.id)!==String(id)); renderHH(); })
    .catch(function(){ alert('N\u00E3o foi poss\u00EDvel apagar.'); });
}
document.getElementById('btnHistView').addEventListener('click',function(){ document.body.classList.add('hh-hist'); window.scrollTo(0,0); carregarHH(); });
document.getElementById('histBack').addEventListener('click',function(){ document.body.classList.remove('hh-hist'); });

pinta();
</script>
</body>
</html>
