<title>Inqu&#xE9;rito de Satisfa&#xE7;&#xE3;o &#xB7; Sport Zone Vasco da Gama</title>
<script src="config.js"></script>
<script src="lucide.js"></script>
<style>
  :root{
    --bg:#f6f5f3;--card:#ffffff;--ink:#1a1303;--muted:#7c7264;--line:#ece7df;
    --accent:#FF8100;--accent-dark:#E06E00;--accent-soft:#ffe7cf;--accent-ink:#8a4500;
    --neg:#dc2626;--pos:#15803d;--neu:#d97706;--shadow:0 1px 2px rgba(26,19,3,.06),0 4px 16px rgba(26,19,3,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;touch-action:pan-y;}
  body{overflow-x:clip;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px;-webkit-text-size-adjust:100%;}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FF8100,#E66200);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;box-shadow:0 2px 12px rgba(230,98,0,.28);}
  .h-top{display:flex;align-items:center;gap:12px;justify-content:space-between;max-width:820px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{width:50px;height:50px;border-radius:12px;flex:none;background:#fff;padding:4px;box-shadow:0 2px 9px rgba(0,0,0,.2);}
  .logo img{width:100%;height:100%;border-radius:8px;display:block;object-fit:cover;}
  .brand h1{font-size:16px;margin:0;font-weight:800;line-height:1.15;}
  .brand p{font-size:12px;margin:2px 0 0;color:#fff;font-weight:600;}
  .h-actions{display:flex;gap:8px;flex:none;align-items:center;}
  .icon-btn{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}

  .tabs{max-width:820px;margin:12px auto 0;padding:0 12px;display:flex;gap:8px;}
  .tab{flex:1;border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:12px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}

  main{max-width:820px;margin:0 auto;padding:12px 12px 24px;}
  .intro{font-size:13px;color:var(--muted);margin:4px 2px 10px;}
  .priv{display:inline-flex;align-items:center;gap:6px;background:#fff4e8;color:var(--accent-ink);border:1px solid var(--accent-soft);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:700;margin:2px 0;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin:12px 0;}
  .part-label{font-size:12px;font-weight:800;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.05em;margin:18px 2px 6px;display:flex;align-items:center;gap:7px;}
  .sec-t{font-size:14px;font-weight:800;color:var(--accent-dark);margin:0 0 4px;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:8px;}
  .field textarea,.field input[type=text]{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);}
  .field textarea{min-height:70px;resize:vertical;}
  .field textarea:focus,.field input:focus{outline:none;border-color:var(--accent);}

  /* likert 1-3 */
  .q{padding:12px 0;border-bottom:1px solid var(--line);}
  .q:last-child{border-bottom:none;}
  .q .qt{font-size:14px;font-weight:600;margin-bottom:9px;}
  .seg{display:flex;gap:7px;}
  .seg button{flex:1;border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:10px;padding:9px 6px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;line-height:1.15;}
  .seg button .n{display:block;font-size:15px;}
  .seg button[data-v="1"].on{background:#fde8e8;border-color:var(--neg);color:var(--neg);}
  .seg button[data-v="2"].on{background:#fef3cd;border-color:var(--neu);color:#9a6700;}
  .seg button[data-v="3"].on{background:#e6f6ec;border-color:var(--pos);color:var(--pos);}

  .yesno{display:flex;gap:8px;}
  .yesno button{flex:1;border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:10px;padding:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
  .yesno button.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  .btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
  .btn.save{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(230,98,0,.3);}
  .status{text-align:center;font-size:13px;color:var(--muted);margin-top:10px;min-height:16px;}

  .thanks{text-align:center;padding:40px 16px;}
  .thanks .big{font-size:44px;}
  .thanks h2{margin:8px 0 4px;color:var(--pos);}
  .thanks p{color:var(--muted);font-size:14px;margin:0 0 16px;}

  /* resultados */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:2px 0 6px;}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:12px;text-align:center;}
  .kpi b{display:block;font-size:26px;font-weight:800;color:var(--accent-dark);line-height:1;}
  .kpi span{font-size:11.5px;color:var(--muted);font-weight:700;}
  .bar-row{margin:9px 0;}
  .bar-row .bl{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px;gap:8px;}
  .bar-row .bl .bv{color:var(--accent-dark);font-weight:800;flex:none;}
  .bar{height:12px;border-radius:6px;background:var(--l0,#f1eee9);overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:6px;}
  .bar i.lo{background:var(--neg);} .bar i.mid{background:var(--neu);} .bar i.hi{background:var(--pos);}
  .qbar{margin:7px 0;}
  .qbar .ql{font-size:12.5px;margin-bottom:3px;display:flex;justify-content:space-between;gap:8px;}
  .qbar .ql .qv{font-weight:800;flex:none;}
  .qbar .bar{height:8px;}
  .dist{display:flex;gap:8px;margin-top:6px;}
  .dist .d{flex:1;text-align:center;border-radius:10px;padding:10px 6px;font-weight:800;}
  .dist .d .dn{display:block;font-size:22px;}
  .dist .d.nao{background:#fde8e8;color:var(--neg);}
  .dist .d.talvez{background:#fef3cd;color:#9a6700;}
  .dist .d.sim{background:#e6f6ec;color:var(--pos);}
  .evo{display:flex;align-items:flex-end;gap:8px;height:130px;padding:6px 2px 0;overflow-x:auto;}
  .evo .col{flex:0 0 46px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .evo .col .eb{width:26px;background:linear-gradient(180deg,#FF8100,#E66200);border-radius:6px 6px 0 0;min-height:3px;}
  .evo .col .ev{font-size:11px;font-weight:800;color:var(--accent-dark);margin-bottom:3px;}
  .evo .col .em{font-size:10.5px;color:var(--muted);margin-top:4px;text-align:center;}
  .cmp{display:flex;align-items:center;gap:10px;background:#faf8f5;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px;font-size:13px;}
  .cmp .delta{font-weight:800;font-size:16px;}
  .cmp .delta.up{color:var(--pos);} .cmp .delta.down{color:var(--neg);} .cmp .delta.eq{color:var(--muted);}
  .open-q{margin:12px 0;}
  .open-q h4{margin:0 0 6px;font-size:13px;color:var(--accent-ink);}
  .open-a{background:#faf8f5;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;margin:6px 0;white-space:pre-wrap;word-break:break-word;}
  .open-a.empty{color:var(--muted);font-style:italic;}
  .locked{text-align:center;padding:44px 18px;color:var(--muted);}
  .locked .big{font-size:40px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .tag{background:var(--accent-soft);color:var(--accent-ink);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700;}
  .hidden{display:none !important;}
</style>

    'Estou satisfeito/a por trabalhar nesta loja.',
    'De forma geral, gosto do meu dia a dia de trabalho.',
    'Sinto orgulho em fazer parte desta equipa.']},
  {id:'2', nome:'Ambiente e Equipa', qs:[
    'Existe um bom ambiente de trabalho.',
    'Sinto-me respeitado/a pelos colegas.',
    'A equipa entreajuda-se no dia a dia.',
    'Sinto-me integrado/a na equipa.']},
  {id:'3', nome:'Lideran\u00E7a e Comunica\u00E7\u00E3o', qs:[
    'A chefia comunica de forma clara.',
    'Sinto-me \u00E0 vontade para falar com a chefia.',
    'Recebo feedback sobre o meu trabalho.',
    'As decis\u00F5es importantes s\u00E3o comunicadas atempadamente.']},
  {id:'4', nome:'Motiva\u00E7\u00E3o e Reconhecimento', qs:[
    'Sinto-me motivado/a no trabalho.',
    'O meu esfor\u00E7o \u00E9 reconhecido.',
    'Sinto que posso crescer nesta loja.',
    'Sou tratado/a de forma justa.']},
  {id:'5', nome:'Condi\u00E7\u00F5es de Trabalho', qs:[
    'As condi\u00E7\u00F5es de trabalho s\u00E3o adequadas.',
    'Os hor\u00E1rios s\u00E3o organizados de forma justa.',
    'Tenho as ferramentas necess\u00E1rias para trabalhar bem.',
    'O volume de trabalho \u00E9 equilibrado.']}
];
const FORM_Q='Recebi forma\u00E7\u00E3o suficiente para desempenhar as minhas fun\u00E7\u00F5es.';
const ABERTAS=[
  {id:'gosto', t:'O que mais gostas no teu trabalho?'},
  {id:'mudaria', t:'O que mudarias na loja?'},
  {id:'desmotiva', t:'O que te desmotiva?'},
  {id:'sugestoes', t:'Sugest\u00F5es de melhoria?'},
  {id:'social', t:'Algo a destacar na \u00E1rea social / conv\u00EDvio da equipa?'}
];
const FINAL_Q='Recomendarias esta loja a um amigo para trabalhar?';
const FINAL_OPTS=[{v:1,t:'N\u00E3o'},{v:2,t:'Talvez'},{v:3,t:'Sim'}];

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function setStatus(t){var e=document.getElementById('status');if(e)e.textContent=t||'';}
function nowISO(){return new Date().toISOString();}
function icons(){ if(window.lucideRepl) window.lucideRepl(); }

/* estado das respostas */
var ans={};       // { '1_0':3, ... }  chave cat_idx
var formSuf=0, querMais='', recomenda=0;

/* ---------- construir o inqu\u00E9rito ---------- */
function segHTML(key, val){
  var h='<div class="seg" data-key="'+key+'">';
  ESCALA.forEach(function(o){ h+='<button type="button" data-v="'+o.v+'"'+(val===o.v?' class="on"':'')+'><span class="n">'+o.v+'</span>'+esc(o.t)+'</button>'; });
  return h+'</div>';
}
function buildSurvey(){
  var h='';
  CATS.forEach(function(cat,ci){
    h+='<div class="part-label">'+(ci+1)+' \u00B7 '+esc(cat.nome)+'</div><div class="card">';
    cat.qs.forEach(function(q,qi){
      var key=cat.id+'_'+qi;
      h+='<div class="q"><div class="qt">'+esc(q)+'</div>'+segHTML(key, ans[key]||0)+'</div>';
    });
    h+='</div>';
  });
  // 6 formacao
  h+='<div class="part-label">6 \u00B7 Forma\u00E7\u00E3o</div><div class="card">'
    +'<div class="q"><div class="qt">'+esc(FORM_Q)+'</div>'+segHTML('form', formSuf)+'</div>'
    +'<div class="field" style="margin-top:12px;"><label>Gostarias de ter mais forma\u00E7\u00E3o?</label>'
    +'<div class="yesno" id="ynForm"><button type="button" data-v="sim">Sim</button><button type="button" data-v="nao">N\u00E3o</button></div></div>'
    +'<div class="field" id="areaWrap" style="display:none;"><label for="area">Em que \u00E1rea?</label><input type="text" id="area" placeholder="Ex: atendimento, caixa, produto\u2026"></div>'
    +'</div>';
  // 7 abertas
  h+='<div class="part-label">7 \u00B7 Perguntas abertas</div><div class="card">';
  ABERTAS.forEach(function(a,i){
    h+='<div class="field"'+(i===ABERTAS.length-1?' style="margin-bottom:0;"':'')+'><label for="ab_'+a.id+'">'+esc(a.t)+'</label><textarea id="ab_'+a.id+'"></textarea></div>';
  });
  h+='</div>';
  // 8 final
  h+='<div class="part-label">8 \u00B7 Pergunta final</div><div class="card"><div class="q" style="border:none;padding-top:0;"><div class="qt">'+esc(FINAL_Q)+'</div>'
    +'<div class="seg" data-key="recomenda">';
  FINAL_OPTS.forEach(function(o){ h+='<button type="button" data-v="'+o.v+'"><span class="n">'+o.v+'</span>'+esc(o.t)+'</button>'; });
  h+='</div></div></div>';
  document.getElementById('survey').innerHTML=h;
  wireSurvey(); icons();
}
function wireSurvey(){
  document.querySelectorAll('#survey .seg').forEach(function(seg){
    var key=seg.getAttribute('data-key');
    seg.querySelectorAll('button').forEach(function(b){
      b.addEventListener('click',function(){
        seg.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
        b.classList.add('on');
        var v=+b.getAttribute('data-v');
        if(key==='form') formSuf=v; else if(key==='recomenda') recomenda=v; else ans[key]=v;
      });
    });
  });
  var yn=document.getElementById('ynForm');
  yn.querySelectorAll('button').forEach(function(b){
    b.addEventListener('click',function(){
      yn.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on'); querMais=b.getAttribute('data-v');
      document.getElementById('areaWrap').style.display=(querMais==='sim')?'block':'none';
    });
  });
}

/* ---------- validar + enviar ---------- */
function totalLikert(){ var n=0; CATS.forEach(function(c){n+=c.qs.length;}); return n; }
function submit(){
  var faltam=totalLikert()-Object.keys(ans).length;
  if(faltam>0){ setStatus('Faltam '+faltam+' resposta(s) nas sec\u00E7\u00F5es 1 a 5.'); window.scrollTo({top:0,behavior:'smooth'}); return; }
  if(!formSuf){ setStatus('Responde \u00E0 pergunta da sec\u00E7\u00E3o 6 (Forma\u00E7\u00E3o).'); return; }
  if(!recomenda){ setStatus('Responde \u00E0 pergunta final (sec\u00E7\u00E3o 8).'); return; }
  if(!BACKEND){ setStatus('Sem liga\u00E7\u00E3o \u00E0 nuvem.'); return; }
  var likert={}; CATS.forEach(function(c){ likert[c.id]=c.qs.map(function(_,i){ return ans[c.id+'_'+i]||0; }); });
  var abertas={}; ABERTAS.forEach(function(a){ var el=document.getElementById('ab_'+a.id); abertas[a.id]=el?el.value.trim():''; });
  var payload={ v:1, data:nowISO(), likert:likert, formSuf:formSuf, querMais:querMais,
    area:(document.getElementById('area')?document.getElementById('area').value.trim():''),
    abertas:abertas, recomenda:recomenda };
  var btn=document.getElementById('btnSubmit'); btn.disabled=true; var old=btn.innerHTML; btn.textContent='A enviar\u2026'; setStatus('');
  fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'nota_add', seccao:SEC, autor:'anon', texto:JSON.stringify(payload)})})
    .then(function(r){return r.json();}).then(function(j){ if(!(j&&j.ok)) throw 0; showThanks(); })
    .catch(function(){ btn.disabled=false; btn.innerHTML=old; setStatus('N\u00E3o foi poss\u00EDvel enviar. Tenta de novo.'); });
}
function showThanks(){
  document.getElementById('viewResp').innerHTML='<div class="thanks"><div class="big">\uD83D\uDE4F</div><h2>Obrigado!</h2><p>A tua resposta foi registada de forma an\u00F3nima.</p></div>';
}

/* ---------- RESULTADOS ---------- */
function mostrarResultados(){
  var box=document.getElementById('resContent');
  if(sessionStorage.getItem('portalOK')!=='1'){
    box.innerHTML='<div class="locked"><div class="big">\uD83D\uDD12</div><p>\u00C1rea de resultados reservada \u00E0 dire\u00E7\u00E3o.<br>Entra pelo portal para consultar as estat\u00EDsticas.</p></div>';
    return;
  }
  if(!BACKEND){ box.innerHTML='<div class="status">Sem liga\u00E7\u00E3o \u00E0 nuvem.</div>'; return; }
  box.innerHTML='<div class="status">A carregar resultados\u2026</div>';
  fetch(BACKEND+'?action=notas&t='+Date.now()).then(function(r){return r.json();}).then(function(j){
    var subs=[];
    if(j&&j.ok&&Array.isArray(j.notas)){
      j.notas.filter(function(n){return String(n.seccao)===SEC;}).forEach(function(n){
        try{ var p=JSON.parse(n.texto||'{}'); if(!p.data) p.data=n.data; subs.push(p); }catch(e){}
      });
    }
    renderResultados(subs);
  }).catch(function(){ box.innerHTML='<div class="status">Sem liga\u00E7\u00E3o. Recarrega.</div>'; });
}
function avg(arr){ var v=arr.filter(function(x){return x>0;}); if(!v.length)return 0; return v.reduce(function(a,b){return a+b;},0)/v.length; }
function barCls(a){ return a>=2.34?'hi':(a>=1.67?'mid':'lo'); }
function pct(a){ return Math.max(0,Math.min(100,(a-1)/2*100)); }
function fmtMes(k){ var p=k.split('-'); var m=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; return (m[(+p[1]||1)-1]||'')+' '+(p[0]||'').slice(2); }

function renderResultados(subs){
  var box=document.getElementById('resContent');
  if(!subs.length){ box.innerHTML='<div class="locked"><div class="big">\uD83D\uDCED</div><p>Ainda n\u00E3o h\u00E1 respostas ao inqu\u00E9rito.</p></div>'; return; }
  var N=subs.length;
  // recolher por categoria/pergunta
  var catAvgs=[], allVals=[];
  CATS.forEach(function(c){
    var perQ=c.qs.map(function(_,qi){
      var vals=subs.map(function(s){ return (s.likert&&s.likert[c.id])?(+s.likert[c.id][qi]||0):0; });
      vals.forEach(function(v){ if(v>0) allVals.push(v); });
      return avg(vals);
    });
    catAvgs.push({nome:c.nome, qs:c.qs, perQ:perQ, media:avg(perQ.map(function(x,i){ return x; }))});
  });
  var mediaGeral=avg(allVals);
  var formSufAvg=avg(subs.map(function(s){return +s.formSuf||0;}));
  var querMaisSim=subs.filter(function(s){return s.querMais==='sim';}).length;
  var areas=subs.map(function(s){return (s.area||'').trim();}).filter(Boolean);
  var recVals=subs.map(function(s){return +s.recomenda||0;}).filter(function(x){return x>0;});
  var recAvg=avg(recVals);
  var recN={1:0,2:0,3:0}; recVals.forEach(function(v){recN[v]=(recN[v]||0)+1;});

  var h='';
  // KPIs
  h+='<div class="kpis">'
    +'<div class="kpi"><b>'+N+'</b><span>respostas</span></div>'
    +'<div class="kpi"><b>'+mediaGeral.toFixed(2)+'</b><span>m\u00E9dia geral (1\u20133)</span></div>'
    +'<div class="kpi"><b>'+recAvg.toFixed(2)+'</b><span>recomenda\u00E7\u00E3o</span></div>'
    +'</div>';
  // media por categoria
  h+='<div class="part-label"><i data-lu="scale"></i> M\u00E9dia por categoria</div><div class="card">';
  catAvgs.forEach(function(c){
    h+='<div class="bar-row"><div class="bl"><span>'+esc(c.nome)+'</span><span class="bv">'+c.media.toFixed(2)+'</span></div>'
      +'<div class="bar"><i class="'+barCls(c.media)+'" style="width:'+pct(c.media)+'%"></i></div></div>';
  });
  h+='</div>';
  // media por pergunta (detalhe por categoria)
  h+='<div class="part-label"><i data-lu="clipboard-list"></i> M\u00E9dia por pergunta</div><div class="card">';
  catAvgs.forEach(function(c){
    h+='<div class="sec-t" style="margin:6px 0 4px;">'+esc(c.nome)+'</div>';
    c.qs.forEach(function(q,qi){
      var a=c.perQ[qi];
      h+='<div class="qbar"><div class="ql"><span>'+esc(q)+'</span><span class="qv">'+a.toFixed(2)+'</span></div>'
        +'<div class="bar"><i class="'+barCls(a)+'" style="width:'+pct(a)+'%"></i></div></div>';
    });
  });
  h+='</div>';
  // formacao
  h+='<div class="part-label"><i data-lu="graduation-cap"></i> Forma\u00E7\u00E3o</div><div class="card">'
    +'<div class="bar-row"><div class="bl"><span>'+esc(FORM_Q)+'</span><span class="bv">'+formSufAvg.toFixed(2)+'</span></div>'
    +'<div class="bar"><i class="'+barCls(formSufAvg)+'" style="width:'+pct(formSufAvg)+'%"></i></div></div>'
    +'<p class="intro" style="margin:10px 2px 0;"><b>'+querMaisSim+'</b> de '+N+' gostariam de mais forma\u00E7\u00E3o ('+Math.round(querMaisSim/N*100)+'%).</p>';
  if(areas.length){ h+='<div class="tags">'+areas.map(function(a){return '<span class="tag">'+esc(a)+'</span>';}).join('')+'</div>'; }
  h+='</div>';
  // recomendacao
  h+='<div class="part-label"><i data-lu="star"></i> Recomenda\u00E7\u00E3o da loja</div><div class="card">'
    +'<div class="dist"><div class="d nao"><span class="dn">'+recN[1]+'</span>N\u00E3o</div>'
    +'<div class="d talvez"><span class="dn">'+recN[2]+'</span>Talvez</div>'
    +'<div class="d sim"><span class="dn">'+recN[3]+'</span>Sim</div></div></div>';
  // evolucao entre inqueritos (por mes)
  var buckets={};
  subs.forEach(function(s){
    var k=(s.data||'').slice(0,7)||'\u2014';
    if(!buckets[k]) buckets[k]={vals:[],n:0};
    buckets[k].n++;
    CATS.forEach(function(c){ if(s.likert&&s.likert[c.id]) s.likert[c.id].forEach(function(v){ if(+v>0) buckets[k].vals.push(+v); }); });
  });
  var keys=Object.keys(buckets).filter(function(k){return k!=='\u2014';}).sort();
  h+='<div class="part-label"><i data-lu="history"></i> Evolu\u00E7\u00E3o entre inqu\u00E9ritos</div><div class="card">';
  if(keys.length){
    h+='<div class="evo">';
    keys.forEach(function(k){
      var a=avg(buckets[k].vals);
      h+='<div class="col"><div class="ev">'+a.toFixed(2)+'</div><div class="eb" style="height:'+(pct(a))+'%"></div><div class="em">'+esc(fmtMes(k))+'<br>('+buckets[k].n+')</div></div>';
    });
    h+='</div>';
    // comparacao entre periodos (ultimos dois)
    if(keys.length>=2){
      var aL=avg(buckets[keys[keys.length-1]].vals), aP=avg(buckets[keys[keys.length-2]].vals);
      var d=aL-aP; var cls=d>0.02?'up':(d<-0.02?'down':'eq'); var sign=d>0?'\u25B2 +':(d<0?'\u25BC ':'= ');
      h+='<div class="cmp"><span class="delta '+cls+'">'+sign+Math.abs(d).toFixed(2)+'</span><span>face ao per\u00EDodo anterior ('+esc(fmtMes(keys[keys.length-2]))+' \u2192 '+esc(fmtMes(keys[keys.length-1]))+').</span></div>';
    }
  } else { h+='<p class="intro" style="margin:0;">Sem dados suficientes para evolu\u00E7\u00E3o.</p>'; }
  h+='</div>';
  // perguntas abertas
  h+='<div class="part-label"><i data-lu="message-circle"></i> Respostas abertas</div><div class="card">';
  ABERTAS.forEach(function(a){
    var resps=subs.map(function(s){return (s.abertas&&s.abertas[a.id])?String(s.abertas[a.id]).trim():'';}).filter(Boolean);
    h+='<div class="open-q"><h4>'+esc(a.t)+' ('+resps.length+')</h4>';
    if(resps.length){ resps.forEach(function(r){ h+='<div class="open-a">'+esc(r)+'</div>'; }); }
    else { h+='<div class="open-a empty">Sem respostas.</div>'; }
    h+='</div>';
  });
  h+='</div>';
  box.innerHTML=h; icons();
}

/* ---------- tabs ---------- */
function showTab(which){
  var resp=which==='resp';
  document.getElementById('tabResp').classList.toggle('on',resp);
  document.getElementById('tabRes').classList.toggle('on',!resp);
  document.getElementById('viewResp').classList.toggle('hidden',!resp);
  document.getElementById('viewRes').classList.toggle('hidden',resp);
  if(!resp) mostrarResultados();
}
document.getElementById('tabResp').addEventListener('click',function(){ showTab('resp'); });
document.getElementById('tabRes').addEventListener('click',function(){ showTab('res'); });
document.getElementById('btnSubmit').addEventListener('click',submit);

buildSurvey();
icons();
</script>
</body>
</html>
